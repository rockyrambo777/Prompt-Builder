<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Song Packaging</title>
  <style>
    :root{
      --bg:#0b0f19; --card:#121a2a; --card2:#0f1626; --border:#23304a;
      --muted:#92a4c7; --text:#e8eefc; --primary:#2f6fed; --danger:#d14b4b;
      --chip:#1c273f; --ok:#7CFFB2; --warn:#ffcc66;
    }
    body { font-family: Arial, sans-serif; background:var(--bg); color:var(--text); margin:0; }
    .wrap { max-width: 1400px; margin: 0 auto; padding: 24px; }
    .top { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
    .muted { color:var(--muted); font-size: 14px; }
    .btn { padding:10px 12px; border-radius:12px; border:1px solid #2a3a5c; background:#121a2a; color:var(--text); cursor:pointer; font-weight:800; }
    .btn.primary { background:var(--primary); border:none; }
    .btn.secondary { background:#1c273f; border:1px solid #2a3a5c; }
    .btn.danger { background:var(--danger); border:none; }
    .btn.copy { background:#16315f; border:1px solid #2a3a5c; }
    .btn.small { padding:8px 10px; font-size:12px; border-radius:10px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:18px; margin-top:14px; }
    .grid { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:12px; }
    @media (max-width: 980px){ .grid { grid-template-columns: 1fr; } }
    label { font-size:12px; color:var(--muted); display:block; margin:8px 0 6px; }
    input, select, textarea {
      padding:12px; border-radius:12px; border:1px solid #2a3a5c;
      background:var(--card2); color:var(--text); width:100%;
      box-sizing:border-box;
    }
    textarea { min-height: 160px; resize: vertical; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .chips { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .chip { font-size:12px; padding:6px 10px; border-radius:999px; border:1px solid #2a3a5c; background:var(--chip); color:var(--text); }
    .pill{
      display:inline-block; padding:4px 10px; border-radius:999px;
      border:1px solid #2a3a5c; background:var(--card2); font-size:12px;
    }
    .pill.ok{ border-color:#1f6b45; }
    .pill.warn{ border-color:#6b4c1d; }

    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    .hint { font-size:12px; color:var(--muted); margin-top:6px; line-height:1.4; }
    .divider{ height:1px; background:#22304a; margin:14px 0; }

    .cols{ display:grid; grid-template-columns: 0.9fr 1.1fr; gap:14px; align-items:start; }
    @media (max-width: 1100px){ .cols{ grid-template-columns: 1fr; } }

    .checkRow{ display:flex; gap:14px; flex-wrap:wrap; align-items:center; margin-top:10px; }
    .checkRow label{ margin:0; display:flex; gap:8px; align-items:center; color:var(--text); font-size:13px; }
    input[type="checkbox"]{ width:18px; height:18px; accent-color: var(--primary); }

    .list{ max-height: 320px; overflow:auto; border:1px solid #2a3a5c; border-radius:14px; background:var(--card2); }
    .item{ padding:12px; border-bottom:1px solid #22304a; cursor:pointer; }
    .item:last-child{ border-bottom:none; }
    .item:hover{ background:#111b2f; }
    .item.active{ background:#142042; }
    .itemTop{ display:flex; justify-content:space-between; gap:10px; align-items:center; }
    .itemTitle{ font-weight:900; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>Song Packaging</h1>
        <div class="muted" id="subline">Loading…</div>
      </div>
      <div class="row">
        <button class="btn" id="btnBack">← Back</button>
        <button class="btn" id="btnAlbum">Album</button>
        <button class="btn" id="btnHome">Home</button>
        <button class="btn danger" id="btnLogout">Logout</button>
      </div>
    </div>

    <div class="card">
      <div class="row" style="justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap;">
        <div class="chips" id="chips"></div>
        <div class="row" style="gap:10px; flex-wrap:wrap;">
          <select id="mode" class="btn" style="min-width:230px;">
            <option value="long">Longform (YouTube)</option>
            <option value="short">Shorts (YouTube + TikTok)</option>
          </select>
          <label class="btn" style="display:flex; gap:10px; align-items:center; user-select:none;">
            <input type="checkbox" id="include_artist_image" />
            Include artist image (thumbnail prompt)
          </label>
          <button class="btn primary" id="btnBuild">Generate</button>
          <button class="btn" id="btnCopy">Copy Prompt</button>
          <button class="btn" id="btnClear">Clear</button>
        </div>
      </div>
      <div class="muted" style="margin-top:10px;">
        Shorts do not have thumbnails (checkbox is ignored in Shorts mode).
      </div>

      <label style="margin-top:14px;">Prompt Output (Copy this into ChatGPT)</label>
      <textarea id="output" class="mono" placeholder="Click Generate…"></textarea>
      <div class="muted" id="statusLine" style="margin-top:8px;"></div>
    </div>

    <div class="card">
      <h3 class="sectionTitle">Song (read-only)</h3>
      <div class="grid">
        <div>
          <label>Title</label>
          <input id="title" disabled />
        </div>
        <div>
          <label>Album</label>
          <input id="album" disabled />
        </div>
      </div>
      <label>Suno Prompt</label>
      <textarea id="suno_prompt" class="mono" disabled></textarea>
      <label>Lyrics</label>
      <textarea id="lyrics" class="mono" disabled style="min-height:220px;"></textarea>
    </div>
  </div>

  <script type="module">
    import { supabase, requireSessionOrRedirect } from "./app.js";

    const SONGS="songs", ALBUMS="albums", ARTISTS="artists";
    const $ = (id)=>document.getElementById(id);
    const qs = new URLSearchParams(location.search);
    const song_id = qs.get("song_id");
    const album_id_qs = qs.get("album_id");

    let song=null, album=null, artist=null;

    $("btnHome").onclick = ()=> location.href = "./home.html";
    $("btnAlbum").onclick = ()=> {
      const aid = album_id_qs || song?.album_id || album?.id;
      if (aid) location.href = `./album-edit.html?id=${encodeURIComponent(aid)}`;
      else history.back();
    };
    $("btnBack").onclick = ()=> history.back();
    $("btnLogout").onclick = async ()=> {
      try { await supabase.auth.signOut(); } catch(e){}
      location.href = "./index.html";
    };

    const safe = (v)=> (v??"").toString();
    const trimOrNone = (v)=> {
      const t = safe(v).trim();
      return t ? t : "(none)";
    };

    function setChips(){
      const chips = $("chips");
      chips.innerHTML = "";
      const items = [];
      if (artist?.name) items.push(`artist: ${artist.name}`);
      if (album?.title) items.push(`album: ${album.title}`);
      if (song?.title) items.push(`song: ${song.title}`);
      if (artist?.main_genre || artist?.secondary_genre){
        const g = [artist?.main_genre, artist?.secondary_genre].filter(Boolean).join(" / ");
        if (g) items.push(`genre: ${g}`);
      }
      for (const t of items){
        const span = document.createElement("span");
        span.className = "chip";
        span.textContent = t;
        chips.appendChild(span);
      }
    }

    function artistLinksBlock(ar){
      const lines = [];
      const pairs = [
        ["YouTube", ar?.youtube_url],
        ["Bandcamp", ar?.bandcamp_url],
        ["Spotify", ar?.spotify_url],
        ["Apple Music", ar?.apple_music_url],
        ["SoundCloud", ar?.soundcloud_url],
        ["Website", ar?.website_url],
      ];
      for (const [name, url] of pairs){
        const u = safe(url).trim();
        if (u) lines.push(`- ${name}: ${u}`);
      }
      return lines.length ? lines.join("\n") : "- (none)";
    }

    function artistDnaBlock(ar){
      const lines = [];
      lines.push(`- Main genre: ${trimOrNone(ar?.main_genre)}`);
      lines.push(`- Secondary genre: ${trimOrNone(ar?.secondary_genre)}`);
      lines.push(`- Default lane: ${trimOrNone(ar?.default_lane)}`);
      lines.push(`- Voice identity: ${trimOrNone(ar?.voice_identity)}`);
      lines.push(`- Suno voice anchor: ${trimOrNone(ar?.suno_voice_anchor)}`);
      lines.push(`- Must include (instruments/vibe): ${trimOrNone(ar?.must_include)}`);
      lines.push(`- Never include: ${trimOrNone(ar?.never_include)}`);
      lines.push(`- Core persona: ${trimOrNone(ar?.default_perso || ar?.default_persona)}`);
      return lines.join("\n");
    }

    function buildPromptText(){
      if (!song || !artist) return "";

      const mode = $("mode").value;
      const includeImg = $("include_artist_image").checked;
      const artistName = safe(artist?.name) || "(unknown artist)";
      const channelHandle = safe(artist?.youtube_handle).trim() || "@(handle)";
      const albumTitle = safe(album?.title).trim() || "(single)";

      const core = [];
      core.push(`Create YouTube packaging copy for the following.`);
      core.push(``);
      core.push(`Return these sections (keep it clean, no extra talk):
PLAYLIST_RECOMMENDATION:`);
      if (mode === "long"){
        core.push(`YOUTUBE_TITLE:`);
        core.push(`YOUTUBE_DESCRIPTION:`);
        core.push(`YOUTUBE_TAGS (comma separated, under 500 characters):`);
        core.push(`PINNED_COMMENT:`);
        core.push(`THUMBNAIL_PROMPT (1280x720, SEO-friendly, readable):`);
      } else {
        core.push(`YOUTUBE_SHORT_TITLE:`);
        core.push(`YOUTUBE_SHORT_DESCRIPTION:`);
        core.push(`YOUTUBE_SHORT_TAGS (comma separated, under 500 characters):`);
        core.push(`PINNED_COMMENT:`);
        core.push(`TIKTOK_DESCRIPTION (short, hashtag-ready):`);
      }

      core.push(``);
      core.push(`Artist info:`);
      core.push(`- Artist: ${artistName}`);
      core.push(`- Channel Handle: ${channelHandle}`);
      core.push(`- Album/Collection: ${albumTitle}`);
      core.push(`- Artist About (use in description): ${trimOrNone(artist?.about)}`);
      core.push(`- Links (add in description if relevant):`);
      core.push(artistLinksBlock(artist));

      core.push(``);
      core.push(`Artist DNA (must follow):`);
      core.push(artistDnaBlock(artist));

      core.push(``);
      core.push(`Song info:`);
      core.push(`- Title: ${safe(song?.title)}`);
      core.push(`- Keywords: ${trimOrNone(song?.keywords)}`);
      // Scripture only if the artist is gospel/christian
      const g = (safe(artist?.main_genre)+" "+safe(artist?.secondary_genre)+" "+safe(artist?.default_lane)).toLowerCase();
      const isGospel = /(gospel|christian|worship)/i.test(g);
      if (isGospel) core.push(`- Scripture (optional): ${trimOrNone(song?.scripture)}`);
      core.push(``);
      core.push(`Suno prompt (use genre + instruments; keep voice anchored by Suno voice anchor):`);
      core.push(`---`);
      core.push(safe(song?.suno_prompt));
      core.push(`---`);
      core.push(``);
      core.push(`Lyrics (paste exactly):`);
      core.push(`---`);
      core.push(safe(song?.lyrics));
      core.push(`---`);

      core.push(``);
      core.push(`Rules:
- PLAYLIST_RECOMMENDATION: Recommend best playlist for this upload. Use artist default playlist if enabled, otherwise album playlist.
`);
      core.push(`- Do NOT include a "Song Details: BPM/Key/Genre/Mood" line.`);
      if (mode === "long"){
        core.push(`- Title must follow your format: [Emotional Hook] | [Song Title] | Soul Music | [Artist].`);
        core.push(`- Description must include: short intro, artist about, lyrics section, hashtags (8–15).`);
        core.push(`- Tags must match the Suno prompt genre + instrumentation and stay under 500 characters.`);
        if (includeImg){
          core.push(`- Thumbnail prompt: include the artist image as reference.`);
        } else {
          core.push(`- Thumbnail prompt: do NOT assume artist image is available.`);
        }
      } else {
        core.push(`- Shorts: no thumbnail prompt; focus on short SEO title + short description + tags + TikTok description.`);
        core.push(`- Tags must match the Suno prompt genre + vibe and stay under 500 characters.`);
      }

      return core.join("\n");
    }

    function toast(msg, ok=true){
      $("statusLine").textContent = msg;
    }

    function build(){
      if (!song) return alert("Missing song_id in URL.");
      $("output").value = buildPromptText();
      toast("Prompt built ✅");
    }

    async function copyOut(){
      const t = $("output").value || "";
      if (!t.trim()) return alert("Nothing to copy.");
      await navigator.clipboard.writeText(t);
      toast("Copied ✅");
    }

    async function loadData(){
      await requireSessionOrRedirect();
      if (!song_id){
        $("subline").textContent = "Missing song_id in URL.";
        return;
      }
      $("subline").textContent = "Loading song…";

      const { data: s, error: se } = await supabase.from(SONGS).select("*").eq("id", song_id).single();
      if (se) {
        $("subline").textContent = "Error loading song: " + se.message;
        return;
      }
      song = s;

      const albumId = album_id_qs || song.album_id;
      if (albumId){
        const { data: a, error: ae } = await supabase.from(ALBUMS).select("*").eq("id", albumId).single();
        if (!ae) album = a;
      }
      const artistId = album?.artist_id || song.artist_id;
      if (artistId){
        const { data: ar, error: are } = await supabase.from(ARTISTS).select("*").eq("id", artistId).single();
        if (!are) artist = ar;
      }

      $("title").value = safe(song?.title);
      $("album").value = safe(album?.title);
      $("suno_prompt").value = safe(song?.suno_prompt);
      $("lyrics").value = safe(song?.lyrics);

      setChips();
      $("subline").textContent = `Loaded: ${safe(song?.title)}`;
      toast("Ready.");
    }

    $("btnBuild").onclick = build;
    $("btnCopy").onclick = copyOut;
    $("btnClear").onclick = ()=> { $("output").value=""; toast("Cleared."); };
    $("mode").onchange = ()=> toast("Mode changed — click Generate.");
    $("include_artist_image").onchange = ()=> toast("Option updated — click Generate.");

    loadData();
  </script>
</body>
</html>
