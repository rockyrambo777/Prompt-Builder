<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Song Packaging</title>
  <style>
    :root{--bg:#0b1220;--card:#0f1a2f;--line:rgba(255,255,255,.08);--text:#e8eefc;--mut:#a8b4d6;--btn:#1e3a8a;--btn2:#0b3b2b}
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:radial-gradient(1200px 600px at 20% -10%,rgba(59,130,246,.25),transparent 60%),radial-gradient(900px 500px at 90% 0%,rgba(16,185,129,.18),transparent 55%),var(--bg);color:var(--text)}
    .top{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;border-bottom:1px solid var(--line)}
    .top h1{margin:0;font-size:22px;letter-spacing:.2px}
    .nav{display:flex;gap:10px;align-items:center}
    .pill{padding:9px 12px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--text);border-radius:999px;text-decoration:none;font-weight:600;font-size:13px}
    .pill.red{background:rgba(239,68,68,.16);border-color:rgba(239,68,68,.28)}
    .wrap{max-width:1200px;margin:22px auto;padding:0 18px}
    .grid{display:grid;grid-template-columns:1.15fr .85fr;gap:18px}
    .card{background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));border:1px solid var(--line);border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
    .card .hd{padding:16px 16px 0 16px} .card .hd h2{margin:0 0 6px 0;font-size:18px}
    .card .bd{padding:16px}
    label{display:block;font-size:12px;color:var(--mut);margin:10px 0 6px}
    input[type=text], textarea, select{width:100%;padding:10px 12px;border-radius:12px;border:1px solid var(--line);background:rgba(0,0,0,.22);color:var(--text);outline:none}
    textarea{min-height:140px;resize:vertical}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .btnbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .btn{padding:10px 14px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--text);cursor:pointer;font-weight:700}
    .btn.primary{background:rgba(59,130,246,.25);border-color:rgba(59,130,246,.35)}
    .btn.copy{background:rgba(16,185,129,.18);border-color:rgba(16,185,129,.35)}
    .mut{color:var(--mut);font-size:12px;line-height:1.35}
    .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    .chip{font-size:12px;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.03)}
    .toast{position:fixed;right:16px;bottom:16px;z-index:999;background:rgba(0,0,0,.75);border:1px solid var(--line);color:var(--text);padding:10px 12px;border-radius:12px;display:none;max-width:min(520px,calc(100vw - 32px))}
    .toast.ok{border-color:rgba(16,185,129,.45)} .toast.bad{border-color:rgba(239,68,68,.45)}
    @media(max-width:980px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="top">
    <div>
      <h1>Song Packaging</h1>
      <div class="mut" id="who">Loading…</div>
    </div>
    <div class="nav">
      <a class="pill" id="btnHome" href="./home.html">Home</a>
      <a class="pill" id="btnAlbum" href="#">Album</a>
      <a class="pill red" href="./index.html">Logout</a>
    </div>
  </div>

  <div class="wrap">
    <div class="card" style="margin-bottom:16px">
      <div class="bd">
        <div class="btnbar" style="justify-content:space-between">
          <div>
            <div class="mut">This page generates prompts only (nothing saved). Use Album Edit checkboxes to mark Long/Short done.</div>
            <div class="chips" id="metaChips"></div>
          </div>
          <div class="btnbar">
            <button class="btn copy" id="btnCopy">Copy Output</button>
          </div>
        </div>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="hd"><h2>Prompt Builder</h2></div>
        <div class="bd">
          <div class="row">
            <div>
              <label>Mode</label>
              <select id="mode">
                <option value="long">YouTube Long (Full video)</option>
                <option value="short">Shorts / TikTok (Shorts only)</option>
              </select>
            </div>
            <div>
              <label>Options</label>
              <div style="display:flex;gap:10px;align-items:center;margin-top:10px">
                <input id="useArtistImg" type="checkbox" />
                <label for="useArtistImg" style="margin:0;color:var(--text);font-size:13px">Include artist image (thumbnail prompt)</label>
              </div>
              <div class="mut" style="margin-top:8px">Shorts do not have thumbnails (checkbox is ignored in Shorts mode).</div>
            </div>
          </div>

          <div class="btnbar" style="margin-top:14px">
            <button class="btn primary" id="btnBuild">Generate Prompt</button>
            <button class="btn" id="btnRebuild">Rebuild (same mode)</button>
          </div>

          <label style="margin-top:14px">Prompt Output (Copy this into ChatGPT)</label>
          <textarea id="out" placeholder="Click Generate Prompt…" spellcheck="false"></textarea>
        </div>
      </div>

      <div class="card">
        <div class="hd"><h2>Song Data (read-only)</h2></div>
        <div class="bd">
          <label>Title</label>
          <input id="title" type="text" readonly />

          <div class="row">
            <div>
              <label>Keywords</label>
              <input id="keywords" type="text" readonly />
            </div>
            <div>
              <label>Scripture (only gospel/christian)</label>
              <input id="scripture" type="text" readonly />
            </div>
          </div>

          <label>Suno Prompt</label>
          <textarea id="suno" readonly></textarea>

          <label>Lyrics</label>
          <textarea id="lyrics" readonly></textarea>

          <label>Artist playlists (optional)</label>
          <textarea id="playlists" readonly placeholder="No default playlists for this artist."></textarea>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module">
    import { requireSessionOrRedirect, readId, supabase } from "./app.js";

    const $ = (id) => document.getElementById(id);

    let albumId = null;
    let songId = null;
    let song = null;
    let artist = null;
    let album = null;
    let playlistsText = "";

    const toast = (msg, ok=true) => {
      const t = $("toast");
      t.textContent = msg;
      t.className = "toast " + (ok ? "ok" : "bad");
      t.style.display = "block";
      setTimeout(() => (t.style.display = "none"), 2200);
    };

    function isGospelArtist(a){
      const mg = (a?.main_genre || "").toLowerCase();
      const sg = (a?.secondary_genre || "").toLowerCase();
      const lane = (a?.default_lane || "").toLowerCase();
      const any = `${mg} ${sg} ${lane}`;
      return any.includes("gospel") || any.includes("christ") || any.includes("worship") || any.includes("christian");
    }

    function buildPromptLong(){
      const includeArtistImg = !!$("useArtistImg").checked;
      const gospel = isGospelArtist(artist);

      const artistBlock = `ARTIST\n- name: ${artist?.name || "(unknown)"}\n- lane: ${artist?.default_lane || "(none)"}\n- persona/voice identity: ${artist?.voice_identity || artist?.default_perso || "(none)"}\n- main genre: ${artist?.main_genre || "(none)"}\n- secondary genre: ${artist?.secondary_genre || "(none)"}\n- must include: ${artist?.must_include || "(none)"}\n- never include: ${artist?.never_include || "(none)"}\n- suno voice anchor: ${artist?.suno_voice_anchor || "(none)"}`;

      const songBlock = `SONG\n- title: ${song?.title || ""}\n- keywords: ${song?.keywords || ""}\n- scripture: ${gospel ? (song?.scripture || "(optional)") : "(not gospel/christian)"}\n- suno prompt (for this song): ${song?.suno_prompt || ""}`;

      const playlistNote = playlistsText
        ? `PLAYLISTS (artist defaults)\n${playlistsText}\n\nIn your response, also tell me which playlists this song fits best can be multiple (or "Album playlist" if none).`
        : `PLAYLISTS\nNo artist default playlists. In your response, also tell me if this should go to an Album playlist or a new mood playlist.`;

      const thumbRule = includeArtistImg
        ? "Thumbnail: INCLUDE artist reference image. Make it bold, high contrast, mobile readable."
        : "Thumbnail: Do NOT include artist reference image. Make it bold, high contrast, mobile readable.";

      return `You are helping me package a SINGLE YouTube long-form video for my music channel.\n\n${artistBlock}\n\n${songBlock}\n\nLYRICS (paste as-is):\n${song?.lyrics || "(no lyrics found)"}\n\n${playlistNote}\n\nRETURN ONLY these sections (clean, no extra talk):\nYOUTUBE_TITLE:\nYOUTUBE_DESCRIPTION_WITH_HASHTAGS:\nYOUTUBE_TAGS_UNDER_500_CHARS (comma-separated):\nPINNED_COMMENT:\nTHUMBNAIL_PROMPT_1280x720 (SEO, readable, eye-catching):\n${thumbRule}\n\nIMPORTANT:\n- Do NOT include the 'Song Details: BPM/Key/Genre/Mood' line.\n- If this is not a gospel/christian artist, do NOT add scripture verses and do NOT mention Bible references.\n- Keep tags genre-accurate based on the Suno prompt and artist genres.\n`;
    }

    function buildPromptShort(){
      const gospel = isGospelArtist(artist);

      const artistBlock = `ARTIST\n- name: ${artist?.name || "(unknown)"}\n- lane: ${artist?.default_lane || "(none)"}\n- persona/voice identity: ${artist?.voice_identity || artist?.default_perso || "(none)"}\n- main genre: ${artist?.main_genre || "(none)"}\n- secondary genre: ${artist?.secondary_genre || "(none)"}`;

      const songBlock = `SONG\n- title: ${song?.title || ""}\n- keywords: ${song?.keywords || ""}\n- scripture: ${gospel ? (song?.scripture || "(optional)") : "(not gospel/christian)"}\n- suno prompt: ${song?.suno_prompt || ""}`;

      const playlistNote = playlistsText
        ? `PLAYLISTS (artist defaults)\n${playlistsText}\n\nIn your response, also tell me which playlist this short should link back to (or "Album playlist" if none).`
        : `PLAYLISTS\nNo artist default playlists. In your response, also tell me if this short should link back to an Album playlist or a mood playlist.`;

      return `You are helping me package a SINGLE Shorts/TikTok post for this song.\n\n${artistBlock}\n\n${songBlock}\n\nLYRICS (paste as-is):\n${song?.lyrics || "(no lyrics found)"}\n\n${playlistNote}\n\nRETURN ONLY these sections (clean, no extra talk):\nSHORTS_TITLE:\nSHORTS_DESCRIPTION_WITH_HASHTAGS:\nSHORTS_TAGS_UNDER_500_CHARS (comma-separated):\nPINNED_COMMENT (YouTube Shorts):\nTIKTOK_DESCRIPTION_WITH_HASHTAGS:\n\nIMPORTANT:\n- Shorts do NOT need a thumbnail prompt.\n- Do NOT include the 'Song Details: BPM/Key/Genre/Mood' line.\n- If this is not a gospel/christian artist, do NOT add scripture verses and do NOT mention Bible references.\n- Keep tags genre-accurate based on the Suno prompt and artist genres.\n`;
    }

    function rebuild(){
      if (!song || !artist) return;
      const mode = $("mode").value;
      $("out").value = (mode === "short") ? buildPromptShort() : buildPromptLong();
      toast("Prompt generated.");
    }

    async function loadPlaylistsForArtist(artistId){
      try{
        const { data, error } = await supabase
          .from("artist_playlists")
          .select("title,description,sort_order")
          .eq("artist_id", artistId)
          .order("sort_order", { ascending: true });

        if (error) { console.warn("playlist load", error.message); return ""; }
        if (!data || !data.length) return "";
        return data.map((p,i)=>`${i+1}. ${p.title}${p.description ? ` — ${p.description}` : ""}`).join("\n");
      } catch(e){
        console.warn(e);
        return "";
      }
    }

    async function init(){
      const session = await requireSessionOrRedirect();
      $("who").textContent = `Signed in: ${session.user.email}`;

      const params = new URLSearchParams(window.location.search);
      albumId = readId(params.get("album_id"));
      songId = readId(params.get("song_id"));

      if (!albumId || !songId){
        toast("Missing album_id or song_id in URL.", false);
        return;
      }

      $("btnAlbum").href = `./album-edit.html?id=${albumId}`;

      const { data: s, error: se } = await supabase
        .from("songs")
        .select("id,album_id,title,keywords,scripture,suno_prompt,lyrics")
        .eq("id", songId)
        .single();
      if (se) { toast(se.message, false); return; }
      song = s;

      // Ensure albumId matches the song
      albumId = song.album_id;

      const { data: a, error: ae } = await supabase
        .from("albums")
        .select("id,title,artist_id,status")
        .eq("id", albumId)
        .single();
      if (ae) { toast(ae.message, false); return; }
      album = a;

      const { data: ar, error: are } = await supabase
        .from("artists")
        .select("id,name,default_lane,default_perso,main_genre,secondary_genre,voice_identity,must_include,never_include,suno_voice_anchor")
        .eq("id", album.artist_id)
        .single();
      if (are) { toast(are.message, false); return; }
      artist = ar;

      playlistsText = await loadPlaylistsForArtist(artist.id);
      $("playlists").value = playlistsText;

      // hide scripture if not gospel artist
      if (!isGospelArtist(artist)) {
        $("scripture").value = "";
      }

      $("title").value = song.title || "";
      $("keywords").value = song.keywords || "";
      $("scripture").value = isGospelArtist(artist) ? (song.scripture || "") : "";
      $("suno").value = song.suno_prompt || "";
      $("lyrics").value = song.lyrics || "";

      const chips = [];
      chips.push(`album: ${album?.title || ""}`);
      chips.push(`artist: ${artist?.name || ""}`);
      chips.push(`song: #? ${song.title || ""}`);
      chips.push(`mode: ${$("mode").value}`);
      $("metaChips").innerHTML = chips.map(c=>`<span class="chip">${c}</span>`).join("");

      $("mode").addEventListener("change", ()=>{
        const mode = $("mode").value;
        $("metaChips").innerHTML = chips.slice(0,3).concat([`mode: ${mode}`]).map(c=>`<span class="chip">${c}</span>`).join("");
      });

      $("btnBuild").onclick = rebuild;
      $("btnRebuild").onclick = rebuild;
      $("btnCopy").onclick = async ()=>{
        await navigator.clipboard.writeText($("out").value || "");
        toast("Copied.");
      };

      // Build once by default
      rebuild();
    }

    init();
  </script>
</body>
</html>
