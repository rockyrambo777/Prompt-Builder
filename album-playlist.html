<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SVS System – Album Playlist Builder</title>
  <style>
    :root{
      --bg:#0b0f19; --card:#121a2a; --card2:#0f1626; --border:#23304a;
      --muted:#92a4c7; --text:#e8eefc; --primary:#2f6fed; --danger:#d14b4b;
      --chip:#1c273f; --ok:#7CFFB2; --warn:#ffcc66;
    }
    body{font-family:Arial,sans-serif;background:var(--bg);color:var(--text);margin:0;}
    .wrap{max-width:1200px;margin:0 auto;padding:24px;}
    .top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;}
    .btn{padding:10px 12px;border-radius:12px;border:1px solid #2a3a5c;background:#121a2a;color:var(--text);cursor:pointer;font-weight:800;}
    .btn.primary{background:var(--primary);border:none;}
    .btn.danger{background:var(--danger);border:none;}
    .card{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:18px;padding:16px;margin-top:16px;}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    .muted{color:var(--muted);font-size:14px;}
    label{display:block;font-size:13px;color:var(--muted);margin:10px 0 6px;}
    input,textarea,select{width:100%;box-sizing:border-box;background:#0b1222;border:1px solid #243457;color:var(--text);border-radius:12px;padding:10px;}
    textarea{min-height:120px;resize:vertical;}
    .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
    .chip{background:var(--chip);border:1px solid #2a3a5c;border-radius:999px;padding:6px 10px;font-size:12px;}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
    .output{min-height:260px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <div style="font-size:28px;font-weight:900;">Album Playlist Builder</div>
        <div class="muted" id="who">Signed in: ...</div>
      </div>
      <div class="row">
        <button class="btn" id="btnBack">Back</button>
        <button class="btn" id="btnAlbum">Album</button>
        <button class="btn danger" id="btnLogout">Logout</button>
      </div>
    </div>

    <div class="card">
      <div class="muted">Creates a ChatGPT prompt to generate a YouTube playlist package for this album (title, full description, hashtags). No data is saved.</div>
      <div class="chips" id="chips"></div>
    </div>

    <div class="card">
<div class="row" style="margin-top:12px;justify-content:space-between;">
        <div class="row">
          <button class="btn primary" id="btnBuild">Build ChatGPT Prompt</button>
          <button class="btn" id="btnCopy">Copy</button>
          <span class="muted" id="status"></span>
        </div>
      </div>

      <label>Prompt Output (copy into ChatGPT)</label>
      <textarea id="out" class="output" readonly>Click Build ChatGPT Prompt…</textarea>
    </div>
  </div>

  <script type="module">
    import { supabase, requireSessionOrRedirect } from "./app.js";
    const $ = (id) => document.getElementById(id);

    // Avoid depending on app.js exporting "logout" (prevents module import crashes)
    async function doLogout(){
      try { await supabase.auth.signOut(); } catch(e) {}
    }

    const session = await requireSessionOrRedirect();
    $("who").textContent = `Signed in: ${session.user.email}`;

    const params = new URLSearchParams(location.search);
    const albumId = (params.get("album_id") || "").trim();
    if (!albumId){ alert("Missing album_id"); location.href="./albums.html"; }

    let album=null, artist=null, songs=[];

    function safe(v){ return (v===null||v===undefined) ? "" : String(v); }
    function trimOrNone(v){ const t=safe(v).trim(); return t ? t : "(none)"; }

    function setChips(){
      const chips = $("chips");
      chips.innerHTML="";
      const bits=[];
      if (artist?.name) bits.push("artist: " + artist.name);
      if (artist?.main_genre || artist?.secondary_genre) bits.push("genre: " + [artist.main_genre, artist.secondary_genre].filter(Boolean).join(" / "));
      if (album?.title) bits.push("album: " + album.title);
      bits.push(`tracks: ${songs.length}`);
      bits.forEach(b=>{
        const s=document.createElement("span"); s.className="chip"; s.textContent=b; chips.appendChild(s);
      });
    }

    function formatTracksForPrompt(list){
      if (!list?.length) return "(no tracks found for this album)";
      return list.map((t, i) => {
        const title = trimOrNone(t.title);
        const keywords = trimOrNone(t.keywords);
        const scripture = trimOrNone(t.scripture);
        const suno = trimOrNone(t.suno_prompt);
        return [
          `#${i+1} ${title}`,
          `- keywords: ${keywords}`,
          `- scripture: ${scripture}`,
          `- suno_prompt: ${suno}`
        ].join("\n");
      }).join("\n\n");
    }

    async function loadAlbumArtistSongs(){
      // Album
      const { data:a, error:e1 } = await supabase
        .from("albums")
        .select("id,title,artist_id,status")
        .eq("id", albumId)
        .single();
      if (e1) throw e1;
      album=a;

      // Artist (via album.artist_id)
      const { data:ar, error:e2 } = await supabase
        .from("artists")
        .select("id,name,main_genre,secondary_genre,default_lane,default_perso,voice_identity,must_include,never_include,suno_voice_anchor")
        .eq("id", album.artist_id)
        .single();
      if (e2) throw e2;
      artist=ar;

      // Songs for album (DO NOT assume track_no or artist_id columns)
      const { data:s, error:e3 } = await supabase
        .from("songs")
        .select("id,album_id,title,keywords,scripture,suno_prompt")
        .eq("album_id", albumId);
      if (e3) throw e3;

      songs = Array.isArray(s) ? s : [];
      // Client-side sort: if titles exist, sort by title; otherwise keep original
      songs = [...songs].sort((x,y)=>safe(x.title).localeCompare(safe(y.title)));

      setChips();
    }

    function buildPrompt(){
      const lane = trimOrNone(artist?.default_lane);
      const persona = trimOrNone(artist?.voice_identity || artist?.default_perso);

      const prompt = [
`Build a YouTube PLAYLIST package for this ALBUM, based directly on the tracks listed below.`,
``,
`Return ONLY these sections (no extra talk):`,
`PLAYLIST_TITLE:`,
`PLAYLIST_DESCRIPTION:`,
`HASHTAGS:`,
``,
`Album info:`,
`- Artist: ${trimOrNone(artist?.name)}`,
`- Album Title: ${trimOrNone(album?.title)}`,
`- Main Genre: ${trimOrNone(artist?.main_genre)}`,
`- Secondary Genre: ${trimOrNone(artist?.secondary_genre)}`,
`- Lane: ${lane}`,
`- Persona/Voice: ${persona}`,
``,
`ALBUM_TRACKS (use these to infer the playlist mood, style, and keywords):`,
formatTracksForPrompt(songs),
``,
`Rules:`,
`- PLAYLIST_TITLE: clickable and SEO-friendly, NOT spammy, matches the artist lane and album vibe.`,
`- PLAYLIST_DESCRIPTION: a full YouTube-ready description (8–14 short lines), emoji-friendly, describes mood + style, and naturally mentions 3–6 track titles.`,
`- HASHTAGS: 8–15 hashtags in ONE line, ready to copy/paste, total under 500 characters, include genre/lane + key themes from Suno prompts.`,
`- Do NOT output tags in comma-separated format—hashtags only.`
      ].join("\n");

      $("out").value = prompt;
      $("status").textContent = "Built ✅";
    }


    $("btnBuild").onclick = () => { try{ buildPrompt(); } catch(err){ console.error(err); alert(err.message || err); } };
    $("btnCopy").onclick  = async () => { await navigator.clipboard.writeText($("out").value); $("status").textContent="Copied ✅"; };
    $("btnBack").onclick  = () => history.back();
    $("btnAlbum").onclick = () => location.href = `./album-edit.html?id=${encodeURIComponent(albumId)}`;
    $("btnLogout").onclick= async () => { await doLogout(); location.href="./index.html"; };

    loadAlbumArtistSongs().catch(err => { console.error(err); alert(err.message || err); });
  </script>
</body>
</html>
