<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SVS System – Production</title>
  <style>
    :root{
      --bg:#0b0f19; --card:#121a2a; --card2:#0f1626; --border:#23304a;
      --muted:#92a4c7; --text:#e8eefc; --primary:#2f6fed; --danger:#d14b4b;
    }
    body { font-family: Arial, sans-serif; background:var(--bg); color:var(--text); margin:0; }
    .wrap { max-width: 1400px; margin: 0 auto; padding: 24px; }
    .top { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
    .muted { color:var(--muted); font-size: 14px; }
    .btn { padding:10px 12px; border-radius:12px; border:1px solid #2a3a5c; background:#121a2a; color:var(--text); cursor:pointer; font-weight:800; text-decoration:none; display:inline-block;}
    .btn.primary { background:var(--primary); border:none; }
    .btn.danger { background:var(--danger); border:none; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:18px; margin-top:14px; }
    table { width:100%; border-collapse: collapse; margin-top:10px; }
    th, td { border-bottom:1px solid #22304a; padding:10px; text-align:left; vertical-align: middle; }
    th { color:var(--muted); font-size:12px; }
    .tiny { width: 70px; }
    .mid { width: 160px; }
    .center { text-align:center; }
    .pill { display:inline-block; padding:4px 10px; border-radius:999px; border:1px solid #2a3a5c; background:var(--card2); color:var(--text); font-size:12px;}
    .ok { color:#7CFFB2; font-weight:900; }
    .no { color:#ffb3b3; font-weight:900; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1 style="margin:0;">Production Queue</h1>
        <div class="muted">Shows songs from <b>approved</b> albums that still need <b>Long</b> and/or <b>Short</b>.</div>
        <div id="who" class="muted"></div>
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <a class="btn" href="./home.html">Home</a>
        <button id="btnLogout" class="btn danger">Logout</button>
      </div>
    </div>

    <div class="card">
      <div id="statusLine" class="muted">Loading…</div>

      <table>
        <thead>
          <tr>
            <th class="tiny">#</th>
            <th>Artist</th>
            <th>Album</th>
            <th>Song</th>
            <th class="mid">Long Form</th>
            <th class="mid">Short</th>
            <th class="mid">Suno</th>
            <th class="mid">Action</th>
          </tr>
        </thead>
        <tbody id="body"></tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { supabase, requireSessionOrRedirect } from "./app.js";
    const $ = (id) => document.getElementById(id);

    const session = await requireSessionOrRedirect();
    $("who").textContent = `Signed in: ${session.user.email}`;

    $("btnLogout").onclick = async () => {
      await supabase.auth.signOut();
      window.location.href = "./index.html";
    };

    function yn(ok){
      return ok ? `<span class="ok">✅ done</span>` : `<span class="no">⬜ pending</span>`;
    }
    function stylePill(s){
      const t = (s || "").trim();
      return t ? `<span class="pill">${t}</span>` : `<span class="pill" style="opacity:.55;">(style not set)</span>`;
    }

    async function load(){
      $("statusLine").textContent = "Loading…";

      // 1) Approved albums
      const { data: albums, error: e1 } = await supabase
        .from("albums")
        .select("id,title,artist_id,status")
        .in("status", ["approved", "producing"])

      if (e1) { $("statusLine").textContent = "Error: " + e1.message; return; }
      if (!albums?.length){
        $("statusLine").textContent = "No approved albums right now.";
        $("body").innerHTML = "";
        return;
      }

      const albumIds = albums.map(a => a.id);

      // 2) Songs in those albums
      const { data: songs, error: e2 } = await supabase
        .from("songs")
        .select("id,album_id,track_number,title,suno_share_url,longform_done,short_done,longform_style,short_style")
        .in("album_id", albumIds)
        .order("album_id", { ascending: true })
        .order("track_number", { ascending: true });

      if (e2) { $("statusLine").textContent = "Error: " + e2.message; return; }

      // 3) Artists for labels
      const artistIds = [...new Set(albums.map(a => a.artist_id).filter(Boolean))];
      const { data: artists, error: e3 } = await supabase
        .from("artists")
        .select("id,name")
        .in("id", artistIds);

      const artistMap = new Map((artists || []).map(a => [a.id, a.name]));
      const albumMap = new Map(albums.map(a => [a.id, a]));

      // 4) Filter queue: hide songs that have BOTH long + short done
      const queue = (songs || []).filter(s => !(!!s.longform_done && !!s.short_done));

      const body = $("body");
      body.innerHTML = "";

      if (!queue.length){
        $("statusLine").textContent = "✅ Everything is complete (long + short) for all songs in approved albums.";
        return;
      }

      let count = 0;
      for (const s of queue){
        const al = albumMap.get(s.album_id);
        if (!al) continue;

        count++;

        const sunoUrl = (s.suno_share_url || "").trim();
        const sunoCell = sunoUrl
          ? `<a class="btn" style="padding:6px 10px;" href="${sunoUrl}" target="_blank" rel="noopener noreferrer">🔗 Suno</a>`
          : `<span class="pill" style="opacity:.55;">no link</span>`;

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td class="tiny"><b>${s.track_number ?? ""}</b></td>
          <td>${artistMap.get(al.artist_id) || "—"}</td>
          <td>${al.title || "—"}</td>
          <td>${s.title || "—"}</td>

          <td>
            ${yn(!!s.longform_done)}
            <div style="margin-top:6px;">${stylePill(s.longform_style)}</div>
          </td>

          <td>
            ${yn(!!s.short_done)}
            <div style="margin-top:6px;">${stylePill(s.short_style)}</div>
          </td>

          <td>${sunoCell}</td>

          <td>
            <button class="btn primary" data-produce>Open</button>
          </td>
        `;

        tr.querySelector("[data-produce]").onclick = () => {
          window.location.href = `./song-video.html?id=${encodeURIComponent(s.id)}&album_id=${encodeURIComponent(s.album_id)}`;
        };

        body.appendChild(tr);
      }

      $("statusLine").textContent = `Showing ${count} song(s) needing Long and/or Short.`;
    }

    await load();
  </script>
</body>
</html>
