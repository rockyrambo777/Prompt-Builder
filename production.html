      const t = $("toast");
      if (!t) return;
      t.textContent = message;
      t.style.display = "block";
      setTimeout(()=>t.style.display="none", 2600);

    const session = await requireSessionOrRedirect();
    $("who").textContent = `Signed in: ${session.user.email}`;

    const params = new URLSearchParams(window.location.search);

    // Keep your helper functions: safeText, setChips, setDNAPreview, metaCompletion, updateMetaKPIs, openMetaModal, closeMetaModal, buildSongSelect, fillSongForm, etc.
    // ... (paste them from your original or previous working version)

    function selectSong(songId) {
      if (!songId) return;
      currentSong = songs.find(s => s.id === songId);
      if (!currentSong) return;

      fillSongForm(currentSong);
      setDNAPreview();
      setEditMode();  // Important: call this to initially disable edit fields if no lyrics
    }

    async function loadData() {
      // Your load logic here: fetch album, artist, songs
      // After fetching:
      buildSongSelect();
      // Auto-select based on URL
      if (song_id_param && songs.some(s => s.id === song_id_param)) {
        $("songSelect").value = song_id_param;
        selectSong(song_id_param);
      } else if (songs.length > 0) {
        selectSong(songs[0].id);
      }
    }

    // Event listeners
    $("songSelect").onchange = (e) => selectSong(e.target.value);
    $("editSongToggle").onchange = setEditMode;
