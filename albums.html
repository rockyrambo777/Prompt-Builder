<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SVS System – Albums</title>
  <style>
    :root{
      --bg:#0b0f19; --card:#121a2a; --card2:#0f1626; --border:#23304a;
      --muted:#92a4c7; --text:#e8eefc; --primary:#2f6fed; --danger:#d14b4b;
      --chip:#1c273f;
    }
    body { font-family: Arial, sans-serif; background:var(--bg); color:var(--text); margin:0; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .top { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
    .muted { color:var(--muted); font-size: 14px; }
    .btn { padding:12px 16px; border-radius:12px; border:1px solid #2a3a5c; background:#121a2a; color:var(--text); cursor:pointer; font-weight:800; }
    .btn.primary { background:var(--primary); border:none; }
    .btn.secondary { background:#1c273f; border:1px solid #2a3a5c; }
    .btn.danger { background:var(--danger); border:none; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:18px; margin-top:14px; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .filters { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-top:12px; }
    select, input {
      padding:12px; border-radius:12px; border:1px solid #2a3a5c;
      background:var(--card2); color:var(--text); width: 280px;
    }
    ul { margin: 12px 0 0; padding:0; list-style:none; }
    .item { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; padding:14px 14px; border-radius:16px; border:1px solid #22304a; background:#0f1626; margin:10px 0; cursor:pointer; }
    .item:hover { border-color:#34507e; }
    .title { font-weight:900; font-size:16px; }
    .meta { font-size:12px; color:var(--muted); margin-top:6px; line-height:1.4; }
    .chips { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .chip { font-size:12px; padding:6px 10px; border-radius:999px; border:1px solid #2a3a5c; background:var(--chip); color:var(--text); }
    .pill { font-size:12px; padding:6px 10px; border-radius:999px; border:1px solid #2a3a5c; background:#121a2a; color:var(--text); }
    .nav { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1 style="margin:0;">Albums</h1>
        <div id="who" class="muted"></div>
      </div>
      <div class="nav">
        <button id="btnAdd" class="btn primary">+ Add Album</button>
        <button id="btnHome" class="btn secondary">Home</button>
        <button id="btnLogout" class="btn danger">Logout</button>
      </div>
    </div>

    <div class="card">
      <div class="row">
        <button id="btnRefresh" class="btn secondary">Refresh</button>
        <div id="msg" class="muted"></div>
      </div>

      <div class="filters">
        <select id="artistFilter">
          <option value="">All artists</option>
        </select>
        <select id="statusFilter">
          <option value="">All statuses</option>
          <option value="draft">draft</option>
          <option value="ideation">ideation</option>
          <option value="approved">approved</option>
          <option value="producing">producing</option>
          <option value="released">released</option>
        </select>
        <input id="q" placeholder="Search title/theme…" />
      </div>

      <ul id="list"></ul>
      <div class="muted" style="margin-top:10px;">
        Tip: Click an album to open the Studio editor.
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase, requireSessionOrRedirect } from "./app.js";
    const $ = (id) => document.getElementById(id);

    const ARTISTS = "artists";
    const ALBUMS = "albums";

    const session = await requireSessionOrRedirect();
    $("who").textContent = `Signed in: ${session.user.email}`;

    let artistsById = {};

    async function loadArtistsFilter(){
      const { data } = await supabase
        .from(ARTISTS)
        .select("id,name")
        .order("name", { ascending: true });

      artistsById = {};
      const sel = $("artistFilter");
      sel.innerHTML = '<option value="">All artists</option>';

      for (const a of data || []) {
        artistsById[a.id] = a;
        const opt = document.createElement("option");
        opt.value = a.id;
        opt.textContent = a.name || "(Untitled)";
        sel.appendChild(opt);
      }
    }

    function fmtDate(iso){
      try { return new Date(iso).toLocaleString(); } catch { return iso; }
    }

    async function loadAlbums(){
      $("msg").textContent = "Loading…";
      $("list").innerHTML = "";

      let query = supabase
        .from(ALBUMS)
        .select("id,created_at,updated_at,artist_id,status,title,total_tracks,theme,mood,style,lead_type")
        .order("updated_at", { ascending: false });

      const af = $("artistFilter").value;
      const sf = $("statusFilter").value;
      const q = $("q").value.trim().toLowerCase();

      if (af) query = query.eq("artist_id", af);
      if (sf) query = query.eq("status", sf);

      const { data } = await query;

      const filtered = q
        ? data.filter(a =>
            (a.title || "").toLowerCase().includes(q) ||
            (a.theme || "").toLowerCase().includes(q) ||
            (a.style || "").toLowerCase().includes(q) ||
            (a.mood || "").toLowerCase().includes(q)
          )
        : data;

      $("msg").textContent = `Loaded ${filtered.length} album(s).`;

      if (!filtered.length) {
        $("list").innerHTML = "<li class='muted'>No albums yet. Click “Add Album”.</li>";
        return;
      }

      for (const a of filtered) {
        const li = document.createElement("li");
        li.className = "item";
        li.onclick = () => window.location.href = `./album-edit.html?id=${encodeURIComponent(a.id)}`;

        const left = document.createElement("div");

        const t = document.createElement("div");
        t.className = "title";
        t.textContent = a.title || "(Draft album – title not approved)";

        const artistName = artistsById[a.artist_id]?.name || "Unknown artist";

        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = `${artistName} • status: ${a.status} • tracks: ${a.total_tracks} • updated: ${fmtDate(a.updated_at || a.created_at)}`;

        left.appendChild(t);
        left.appendChild(meta);

        const right = document.createElement("div");
        right.className = "pill";
        right.textContent = "Open";

        li.appendChild(left);
        li.appendChild(right);
        $("list").appendChild(li);
      }
    }

    $("btnAdd").onclick = () => window.location.href = "./album-new.html";
    $("btnRefresh").onclick = loadAlbums;
    $("artistFilter").onchange = loadAlbums;
    $("statusFilter").onchange = loadAlbums;
    $("q").oninput = () => setTimeout(loadAlbums, 200);

    $("btnHome").onclick = () => window.location.href = "./home.html";
    $("btnLogout").onclick = async () => {
      await supabase.auth.signOut();
      window.location.href = "./index.html";
    };

    await loadArtistsFilter();
    loadAlbums();
  </script>
</body>
</html>
