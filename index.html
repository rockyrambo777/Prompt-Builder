<!DOCTYPE html>
<html>
<head>
  <title>SVS System</title>
</head>
<body>

<div id="login-screen">
  <h2>Login</h2>
  <input type="email" id="email" placeholder="Email"><br><br>
  <input type="password" id="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
</div>

<div id="home-screen" style="display:none;">
  <h2>Welcome</h2>
  <button onclick="logout()">Logout</button>
  <br><br>
  <button onclick="addArtist()">Add Artist</button>
</div>

<script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

  const SUPABASE_URL = "https://ppfzhgeesaweubbwwlle.supabase.co";
  const SUPABASE_KEY = "sb_publishable_8NqpLKwhNvH41TjZdHygYg_iB6u1PjB";

  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

  // Check if already logged in
  const { data: { session } } = await supabase.auth.getSession();
  if (session) showHome();

  window.login = async function () {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { error } = await supabase.auth.signInWithPassword({
      email,
      password
    });

    if (error) {
      alert(error.message);
    } else {
      showHome();
    }
  };

  window.logout = async function () {
    await supabase.auth.signOut();
    document.getElementById("home-screen").style.display = "none";
    document.getElementById("login-screen").style.display = "block";
  };

  function showHome() {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("home-screen").style.display = "block";
  }

  window.addArtist = async function () {
    const name = prompt("Artist Name:");
    if (!name) return;

    const { error } = await supabase
      .from("artist")   // change to "artists" if that's your table name
      .insert([{ name }]);

    if (error) alert(error.message);
    else alert("Artist added!");
  };

</script>

</body>
</html>
