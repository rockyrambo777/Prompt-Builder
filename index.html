<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SVS Music – Artist Manager</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background:#0b0f19; color:#e8eefc; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 24px; }
    .card { background:#121a2a; border:1px solid #23304a; border-radius:12px; padding:18px; margin: 12px 0; }
    .row { display:flex; gap:12px; flex-wrap: wrap; }
    .row > * { flex: 1; min-width: 220px; }
    input, button { width: 100%; padding: 12px; border-radius:10px; border:1px solid #2a3a5c; background:#0f1626; color:#e8eefc; }
    input::placeholder { color:#92a4c7; }
    button { cursor:pointer; border:none; background:#2f6fed; font-weight:700; }
    button.secondary { background:#1c273f; border:1px solid #2a3a5c; }
    button.danger { background:#d14b4b; }
    h1,h2 { margin: 6px 0 14px; }
    .muted { color:#92a4c7; font-size: 14px; }
    .topbar { display:flex; justify-content: space-between; align-items:center; gap:12px; }
    .badge { font-size: 12px; padding: 4px 8px; border-radius: 999px; background:#1c273f; border:1px solid #2a3a5c; }
    .list-item { display:flex; justify-content: space-between; align-items:center; gap:12px; padding: 10px 0; border-bottom: 1px solid #23304a; }
    .list-item:last-child { border-bottom: none; }
    .hidden { display:none; }
    .error { color:#ff9b9b; }
    .success { color:#8dffb0; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <h1>SVS Music</h1>
      <div id="sessionBadge" class="badge hidden"></div>
    </div>

    <!-- LOGIN VIEW -->
    <div id="loginView" class="card">
      <h2>Login</h2>
      <p class="muted">Sign in to manage artists.</p>

      <div class="row">
        <div>
          <input id="loginEmail" type="email" placeholder="Email" autocomplete="username" />
        </div>
        <div>
          <input id="loginPassword" type="password" placeholder="Password" autocomplete="current-password" />
        </div>
      </div>

      <div class="row">
        <div><button id="btnLogin">Sign in</button></div>
        <div><button id="btnLoginClear" class="secondary">Clear</button></div>
      </div>

      <p id="loginMsg" class="muted"></p>
    </div>

    <!-- HOME VIEW -->
    <div id="homeView" class="hidden">
      <div class="card">
        <div class="topbar">
          <div>
            <h2>Home</h2>
            <p class="muted">Add and manage artists. (Next we’ll add personas, albums, tracks, and history.)</p>
          </div>
          <div style="min-width: 220px;">
            <button id="btnLogout" class="danger">Logout</button>
          </div>
        </div>

        <div class="row">
          <div><button id="btnShowAddArtist">+ Add Artist</button></div>
          <div><button id="btnRefresh" class="secondary">Refresh List</button></div>
        </div>

        <!-- Add Artist Form -->
        <div id="addArtistCard" class="card hidden" style="margin-top:12px;">
          <h2>Add Artist</h2>
          <div class="row">
            <div><input id="artistName" type="text" placeholder="Artist name (e.g., Nina's Gospel Groove)" /></div>
            <div><input id="artistHandle" type="text" placeholder="Channel handle (optional) (e.g., @NinasGospelGroove)" /></div>
          </div>
          <div class="row">
            <div><input id="artistLane" type="text" placeholder="Default lane (optional) (e.g., Country Gospel)" /></div>
            <div><button id="btnAddArtist">Save Artist</button></div>
          </div>
          <p id="addArtistMsg" class="muted"></p>
        </div>
      </div>

      <!-- Artists List -->
      <div class="card">
        <h2>Artists</h2>
        <p class="muted">If this list loads after login, your GitHub page is connected to Supabase correctly.</p>
        <div id="artistsList" class="muted">Loading…</div>
        <p id="artistsMsg" class="muted"></p>
      </div>
    </div>
  </div>

  <!-- Supabase JS (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // =========================
    // 1) CONFIG (PASTE YOURS)
    // =========================
    const SUPABASE_URL = "https://ppfzhgeesawebubwlle.supabase.co";
    const SUPABASE_KEY = "sb_publishable_8NqpLKwhNvH41TjZdHygYg_iB6u1PjB"; // <-- publishable key only

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // =========================
    // 2) UI HELPERS
    // =========================
    const el = (id) => document.getElementById(id);
    const loginView = el("loginView");
    const homeView = el("homeView");
    const sessionBadge = el("sessionBadge");

    function showLogin() {
      loginView.classList.remove("hidden");
      homeView.classList.add("hidden");
      sessionBadge.classList.add("hidden");
      sessionBadge.textContent = "";
    }

    function showHome(email) {
      loginView.classList.add("hidden");
      homeView.classList.remove("hidden");
      sessionBadge.classList.remove("hidden");
      sessionBadge.textContent = email ? `Signed in: ${email}` : "Signed in";
    }

    function setMsg(targetId, text, type="muted") {
      const target = el(targetId);
      target.className = type;
      target.textContent = text || "";
    }

    // =========================
    // 3) AUTH
    // =========================
    async function handleLogin() {
      setMsg("loginMsg", "Signing in…");
      const email = el("loginEmail").value.trim();
      const password = el("loginPassword").value;

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        setMsg("loginMsg", error.message, "error");
        return;
      }

      setMsg("loginMsg", "Success!", "success");
      showHome(data.user?.email);
      await loadArtists();
    }

    async function handleLogout() {
      await supabase.auth.signOut();
      showLogin();
      setMsg("artistsList", "Loading…");
      setMsg("artistsMsg", "");
    }

    // Keep UI in sync on refresh
    async function initSession() {
      const { data } = await supabase.auth.getSession();
      const session = data?.session;

      if (session?.user) {
        showHome(session.user.email);
        await loadArtists();
      } else {
        showLogin();
      }
    }

    // =========================
    // 4) ARTISTS CRUD (basic)
    // =========================
    async function loadArtists() {
      setMsg("artistsMsg", "Loading artists…");
      el("artistsList").textContent = "Loading…";

      const { data, error } = await supabase
        .from("artists")
        .select("id, name, channel_handle, default_lane, created_at")
        .order("created_at", { ascending: false });

      if (error) {
        el("artistsList").textContent = "";
        setMsg("artistsMsg", `Error loading artists: ${error.message}`, "error");
        return;
      }

      setMsg("artistsMsg", `Loaded ${data.length} artist(s).`, "success");

      if (!data.length) {
        el("artistsList").innerHTML = `<div class="muted">No artists yet. Click “Add Artist”.</div>`;
        return;
      }

      el("artistsList").innerHTML = data.map(a => `
        <div class="list-item">
          <div>
            <div><strong>${escapeHtml(a.name)}</strong></div>
            <div class="muted">
              ${a.channel_handle ? escapeHtml(a.channel_handle) : "No channel handle"} ·
              ${a.default_lane ? escapeHtml(a.default_lane) : "No lane"}
            </div>
          </div>
          <div class="badge">${new Date(a.created_at).toLocaleString()}</div>
        </div>
      `).join("");
    }

    async function addArtist() {
      setMsg("addArtistMsg", "Saving…");

      const name = el("artistName").value.trim();
      const channel_handle = el("artistHandle").value.trim() || null;
      const default_lane = el("artistLane").value.trim() || null;

      if (!name) {
        setMsg("addArtistMsg", "Artist name is required.", "error");
        return;
      }

      const { error } = await supabase
        .from("artists")
        .insert([{ name, channel_handle, default_lane }]);

      if (error) {
        setMsg("addArtistMsg", `Error: ${error.message}`, "error");
        return;
      }

      setMsg("addArtistMsg", "Artist added!", "success");
      el("artistName").value = "";
      el("artistHandle").value = "";
      el("artistLane").value = "";

      await loadArtists();
    }

    // small XSS safety for rendering names
    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    // =========================
    // 5) WIRE UP BUTTONS
    // =========================
    el("btnLogin").addEventListener("click", handleLogin);
    el("btnLoginClear").addEventListener("click", () => {
      el("loginEmail").value = "";
      el("loginPassword").value = "";
      setMsg("loginMsg", "");
    });

    el("btnLogout").addEventListener("click", handleLogout);
    el("btnRefresh").addEventListener("click", loadArtists);

    el("btnShowAddArtist").addEventListener("click", () => {
      el("addArtistCard").classList.toggle("hidden");
      setMsg("addArtistMsg", "");
    });

    el("btnAddArtist").addEventListener("click", addArtist);

    // Enter key on password triggers login
    el("loginPassword").addEventListener("keydown", (e) => {
      if (e.key === "Enter") handleLogin();
    });

    // Start
    initSession();
  </script>
</body>
</html>
