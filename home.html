<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SVS System – Home</title>
  <style>
    body { font-family: Arial, sans-serif; background:#0b0f19; color:#e8eefc; margin:0; }
    .wrap { max-width: 1000px; margin: 0 auto; padding: 24px; }
    .top { display:flex; justify-content:space-between; align-items:center; gap:12px; }
    .muted { color:#92a4c7; font-size: 14px; }
    .btn { padding:12px 14px; border-radius:12px; border:1px solid #2a3a5c; background:#121a2a; color:#e8eefc; cursor:pointer; font-weight:700; }
    .btn.danger { background:#d14b4b; border:none; }

    /* now 3 cards */
    .grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:14px; margin-top:18px; }
    .card { background:#121a2a; border:1px solid #23304a; border-radius:16px; padding:18px; cursor:pointer; }
    .card:hover { border-color:#355a9b; }
    .card h3 { margin: 0 0 8px; }
    .card p { margin:0; }

    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1 style="margin:0;">SVS System</h1>
        <div id="who" class="muted"></div>
      </div>
      <button id="btnLogout" class="btn danger">Logout</button>
    </div>

    <div class="grid">
      <div class="card" id="goArtists">
        <h3>Artists</h3>
        <p class="muted">View & manage artists (profiles, personas, defaults).</p>
      </div>

      <div class="card" id="goAlbums">
        <h3>Albums</h3>
        <p class="muted">Album Studio: create albums, prompts, and tracklists.</p>
      </div>

      <div class="card" id="goProduction">
        <h3>Production</h3>
        <p class="muted">Produce videos for songs in approved albums.</p>
      </div>

      <div class="card" id="goPackaging">
        <h3>YouTube Packaging</h3>
        <p class="muted">Titles, descriptions, tags, pinned comments, thumbnails & TikTok copy.</p>
      </div>
      
    </div>
  </div>

  <script type="module">
    import { supabase, requireSessionOrRedirect } from "./app.js";

    const session = await requireSessionOrRedirect();
    document.getElementById("who").textContent = `Signed in: ${session.user.email}`;

    document.getElementById("btnLogout").onclick = async () => {
      await supabase.auth.signOut();
      window.location.href = "./index.html";
    };

    document.getElementById("goArtists").onclick = () => window.location.href = "./artists.html";
    document.getElementById("goAlbums").onclick = () => window.location.href = "./albums.html";
    document.getElementById("goProduction").onclick = () => window.location.href = "./production.html";
    document.getElementById("goPackaging").onclick = () => window.location.href = "./youtube-packaging.html";
  </script>
</body>
</html>
