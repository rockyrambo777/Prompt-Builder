<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SVS System – Home</title>
  <style>
    body { font-family: Arial, sans-serif; background:#0b0f19; color:#e8eefc; margin:0; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 24px; }
    .card { background:#121a2a; border:1px solid #23304a; border-radius:14px; padding:18px; margin:12px 0; }
    input, button { padding:12px; border-radius:10px; border:1px solid #2a3a5c; background:#0f1626; color:#e8eefc; }
    button { border:none; background:#2f6fed; font-weight:700; cursor:pointer; }
    button.secondary { background:#1c273f; border:1px solid #2a3a5c; }
    button.danger { background:#d14b4b; }
    .row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
    .muted { color:#92a4c7; font-size: 14px; }
    ul { margin:0; padding-left: 18px; }
    li { margin: 8px 0; cursor:pointer; }
    li.selected { font-weight: bold; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="row" style="justify-content:space-between;">
      <div>
        <h1 style="margin:0;">SVS System</h1>
        <div id="who" class="muted"></div>
      </div>
      <button id="btnLogout" class="danger">Logout</button>
    </div>

    <div class="card">
      <h2 style="margin-top:0;">Artists</h2>

      <div class="row">
        <input id="newArtist" placeholder="Artist name…" style="min-width:280px;">
        <button id="btnAdd">Add Artist</button>
        <button id="btnRefresh" class="secondary">Refresh</button>
      </div>

      <div id="msg" class="muted"></div>
      <ul id="list"></ul>
    </div>

    <div class="card">
      <h2 style="margin-top:0;">Selected Artist</h2>
      <div id="selected" class="muted">None selected.</div>
      <p class="muted">Next: personas → albums → tracks → history (based on selected artist).</p>
    </div>
  </div>

  <script type="module">
    import { supabase, requireSessionOrRedirect } from "./app.js";
    const $ = (id) => document.getElementById(id);

    let selectedId = null;
    let selectedName = null;

    const session = await requireSessionOrRedirect();
    $("who").textContent = `Signed in: ${session.user.email}`;

    async function loadArtists() {
      $("msg").textContent = "Loading…";
      $("list").innerHTML = "";

      const { data, error } = await supabase
        .from("artist") // change to "artists" if your table is plural
        .select("id,name,created_at")
        .order("created_at", { ascending: false });

      if (error) { $("msg").textContent = "Error: " + error.message; return; }

      $("msg").textContent = `Loaded ${data.length} artist(s).`;
      if (!data.length) { $("list").innerHTML = "<li class='muted'>No artists yet.</li>"; return; }

      $("list").innerHTML = "";
      for (const a of data) {
        const li = document.createElement("li");
        li.textContent = a.name;
        if (a.id === selectedId) li.classList.add("selected");
        li.onclick = () => {
          selectedId = a.id;
          selectedName = a.name;
          $("selected").textContent = `${selectedName} (id: ${selectedId})`;
          loadArtists(); // re-render highlights
        };
        $("list").appendChild(li);
      }
    }

    async function addArtist() {
      const name = $("newArtist").value.trim();
      if (!name) return alert("Enter an artist name.");
      $("msg").textContent = "Adding…";

      const { error } = await supabase.from("artist").insert([{ name }]);
      if (error) { $("msg").textContent = "Error: " + error.message; return; }

      $("newArtist").value = "";
      $("msg").textContent = "Artist added!";
      await loadArtists();
    }

    $("btnAdd").onclick = addArtist;
    $("btnRefresh").onclick = loadArtists;

    $("btnLogout").onclick = async () => {
      await supabase.auth.signOut();
      window.location.href = "./index.html";
    };

    loadArtists();
  </script>
</body>
</html>
