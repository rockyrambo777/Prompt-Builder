<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SVS System – Artists</title>
  <style>
    :root{
      --bg:#0b0f19; --card:#121a2a; --card2:#0f1626; --border:#23304a;
      --muted:#92a4c7; --text:#e8eefc; --primary:#2f6fed; --danger:#d14b4b;
    }
    body { font-family: Arial, sans-serif; background:var(--bg); color:var(--text); margin:0; }
    .wrap { max-width: 1000px; margin: 0 auto; padding: 24px; }
    .top { display:flex; justify-content:space-between; align-items:center; gap:12px; }
    .muted { color:var(--muted); font-size: 14px; }
    .btn { padding:12px 14px; border-radius:12px; border:1px solid #2a3a5c; background:#121a2a; color:var(--text); cursor:pointer; font-weight:700; }
    .btn.secondary { background:#1c273f; border:1px solid #2a3a5c; }
    .btn.primary { background:var(--primary); border:none; }
    .btn.danger { background:var(--danger); border:none; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:18px; margin-top:14px; }
    ul { margin: 12px 0 0; padding:0; list-style:none; }
    .item { display:flex; justify-content:space-between; align-items:center; gap:10px; padding:12px 12px; border-radius:14px; border:1px solid #22304a; background:#0f1626; margin:10px 0; cursor:pointer; }
    .item:hover { border-color:#34507e; }
    .name { font-weight:800; }
    .meta { font-size:12px; color:var(--muted); margin-top:4px; }
    .pill { font-size:12px; padding:6px 10px; border-radius:999px; border:1px solid #2a3a5c; background:#121a2a; color:var(--text); }
    .nav { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1 style="margin:0;">Artists</h1>
        <div id="who" class="muted"></div>
      </div>
      <div class="nav">
        <button id="btnAdd" class="btn primary">+ Add Artist</button>
        <button id="btnHome" class="btn secondary">Home</button>
        <button id="btnLogout" class="btn danger">Logout</button>
      </div>
    </div>

    <div class="card">
      <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
        <button id="btnRefresh" class="btn secondary">Refresh</button>
        <div id="msg" class="muted"></div>
      </div>

      <ul id="list"></ul>
      <div class="muted" style="margin-top:10px;">
        Tip: Click an artist to view the profile.
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase, requireSessionOrRedirect } from "./app.js";
    const $ = (id) => document.getElementById(id);

    const TABLE = "artists";

    const session = await requireSessionOrRedirect();
    $("who").textContent = `Signed in: ${session.user.email}`;

    async function loadArtists() {
      $("msg").textContent = "Loading…";
      $("list").innerHTML = "";

      const { data, error } = await supabase
        .from(TABLE)
        .select("id,name,channel_hand,default_lane,created_at")
        .order("created_at", { ascending: false });

      if (error) { $("msg").textContent = "Error: " + error.message; return; }

      $("msg").textContent = `Loaded ${data.length} artist(s).`;
      if (!data.length) {
        $("list").innerHTML = "<li class='muted'>No artists yet. Click “Add Artist”.</li>";
        return;
      }

      for (const a of data) {
        const li = document.createElement("li");
        li.className = "item";
        li.onclick = () => window.location.href = `./artist-view.html?id=${encodeURIComponent(a.id)}`;

        const left = document.createElement("div");
        const name = document.createElement("div");
        name.className = "name";
        name.textContent = a.name || "(Untitled)";

        const meta = document.createElement("div");
        meta.className = "meta";
        const parts = [];
        if (a.channel_hand) parts.push("@" + String(a.channel_hand).replace(/^@/, ""));
        if (a.default_lane) parts.push(a.default_lane);
        meta.textContent = parts.join(" • ") || "—";

        left.appendChild(name);
        left.appendChild(meta);

        const right = document.createElement("div");
        right.className = "pill";
        right.textContent = "View";

        li.appendChild(left);
        li.appendChild(right);
        $("list").appendChild(li);
      }
    }

    $("btnRefresh").onclick = loadArtists;
    $("btnHome").onclick = () => window.location.href = "./home.html";
    $("btnAdd").onclick = () => window.location.href = "./artist-new.html";

    $("btnLogout").onclick = async () => {
      await supabase.auth.signOut();
      window.location.href = "./index.html";
    };

    loadArtists();
  </script>
</body>
</html>
