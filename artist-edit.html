<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SVS System – Edit Artist</title>
  <style>
    :root{
      --bg:#0b0f19; --card:#121a2a; --card2:#0f1626; --border:#23304a;
      --muted:#92a4c7; --text:#e8eefc; --primary:#2f6fed; --danger:#d14b4b;
      --ok:#2ecc71;
    }
    body { font-family: Arial, sans-serif; background:var(--bg); color:var(--text); margin:0; }
    .wrap { max-width: 1000px; margin: 0 auto; padding: 24px; }
    .top { display:flex; justify-content:space-between; align-items:center; gap:12px; }
    .muted { color:var(--muted); font-size: 14px; }
    .btn { padding:12px 14px; border-radius:12px; border:1px solid #2a3a5c; background:#121a2a; color:var(--text); cursor:pointer; font-weight:700; }
    .btn.primary { background:var(--primary); border:none; }
    .btn.secondary { background:#1c273f; border:1px solid #2a3a5c; }
    .btn.danger { background:var(--danger); border:none; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:18px; margin-top:14px; }
    .grid { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:12px; }
    @media (max-width: 800px){ .grid { grid-template-columns: 1fr; } }
    label { font-size:12px; color:var(--muted); display:block; margin:8px 0 6px; }
    input, select {
      padding:12px; border-radius:12px; border:1px solid #2a3a5c;
      background:var(--card2); color:var(--text); width:100%;
      box-sizing:border-box;
    }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .sectionTitle { margin: 0 0 10px; }
    .hint { font-size:12px; color:var(--muted); margin-top:4px; }
    .actions { display:flex; gap:10px; flex-wrap:wrap; justify-content:space-between; align-items:center; }
    .rightActions { display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end; }
    .linksRow { display:flex; flex-wrap:wrap; gap:10px; margin-top:10px; }
    .linkBtn {
      display:inline-flex; gap:8px; align-items:center;
      padding:10px 12px; border-radius:999px; border:1px solid #2a3a5c;
      background:#0f1626; color:var(--text); text-decoration:none; font-weight:700;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1 style="margin:0;" id="title">Edit Artist</h1>
        <div id="who" class="muted"></div>
      </div>
      <div class="row">
        <button id="btnBack" class="btn secondary">Back</button>
        <button id="btnLogout" class="btn danger">Logout</button>
      </div>
    </div>

    <div class="card">
      <div class="actions">
        <div>
          <div id="status" class="muted"></div>
          <div class="muted" style="margin-top:6px;">Artist ID: <span id="artistId"></span></div>
        </div>
        <div class="rightActions">
          <button id="btnSave" class="btn primary">Save</button>
        </div>
      </div>

      <div id="quickLinks" class="linksRow" style="display:none;"></div>

      <h2 class="sectionTitle" style="margin-top:18px;">Profile</h2>
      <div class="grid">
        <div>
          <label for="name">Name *</label>
          <input id="name" placeholder="e.g. SoulVibe Sanctuary">
        </div>
        <div>
          <label for="channel_hand">Channel Handle</label>
          <input id="channel_hand" placeholder="e.g. @SoulVibeSanctuary">
          <div class="hint">Stored without @ (we remove it automatically).</div>
        </div>
        <div>
          <label for="youtube_chan">YouTube Channel Name</label>
          <input id="youtube_chan" placeholder="Display name on YouTube">
        </div>
        <div>
          <label for="default_lane">Default Lane</label>
          <select id="default_lane">
            <option value="">(none)</option>
            <option value="SVS">SoulVibe Sanctuary</option>
            <option value="GGG">Gospel Groove Girls</option>
            <option value="NGG">Nina's Gospel Groove</option>
            <option value="GSG">Glory Shout Gospel</option>
            <option value="SIS">Shaun in Stereo</option>
          </select>
        </div>
        <div>
          <label for="default_perso">Default Persona</label>
          <input id="default_perso" placeholder="e.g. Persona v3 / Worship Anthem / etc">
        </div>
      </div>

      <h2 class="sectionTitle" style="margin-top:18px;">Links</h2>
      <div class="grid">
        <div><label for="spotify_url">Spotify</label><input id="spotify_url" placeholder="https://..."></div>
        <div><label for="bandcamp_ur">Bandcamp</label><input id="bandcamp_ur" placeholder="https://..."></div>
        <div><label for="apple_music_">Apple Music</label><input id="apple_music_" placeholder="https://..."></div>
        <div><label for="soundcloud_u">SoundCloud</label><input id="soundcloud_u" placeholder="https://..."></div>
        <div><label for="youtube_url">YouTube</label><input id="youtube_url" placeholder="https://..."></div>
        <div><label for="website_url">Website</label><input id="website_url" placeholder="https://..."></div>
        <div><label for="beacons_url">Beacons</label><input id="beacons_url" placeholder="https://..."></div>
        <div><label for="tiktok_url">TikTok</label><input id="tiktok_url" placeholder="https://..."></div>
        <div><label for="facebook_url">Facebook</label><input id="facebook_url" placeholder="https://..."></div>
      </div>

      <div class="hint" style="margin-top:12px;">
        Next step after this: we can auto-fill the “Generate” pages using <b>default_lane</b> + <b>default_perso</b> + links.
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase, requireSessionOrRedirect } from "./app.js";
    const $ = (id) => document.getElementById(id);

    const TABLE = "artists";

    const session = await requireSessionOrRedirect();
    $("who").textContent = `Signed in: ${session.user.email}`;

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");
    if (!id) {
      alert("Missing artist id.");
      window.location.href = "./artists.html";
    }
    $("artistId").textContent = id;

    function normalizeHandle(v){
      const s = (v || "").trim();
      if (!s) return null;
      return s.startsWith("@") ? s.slice(1) : s;
    }

    function normalizeUrl(v){
      const s = (v || "").trim();
      if (!s) return null;
      if (s.startsWith("http://") || s.startsWith("https://")) return s;
      return "https://" + s;
    }

    function setStatus(txt){ $("status").textContent = txt; }

    function buildQuickLinks(artist){
      const links = [
        ["YouTube", artist.youtube_url],
        ["Spotify", artist.spotify_url],
        ["Bandcamp", artist.bandcamp_ur],
        ["Apple", artist.apple_music_],
        ["SoundCloud", artist.soundcloud_u],
        ["Website", artist.website_url],
        ["Beacons", artist.beacons_url],
        ["TikTok", artist.tiktok_url],
        ["Facebook", artist.facebook_url],
      ].filter(([,url]) => !!url);

      const box = $("quickLinks");
      box.innerHTML = "";
      if (!links.length) { box.style.display = "none"; return; }
      box.style.display = "flex";

      for (const [label, url] of links) {
        const a = document.createElement("a");
        a.className = "linkBtn";
        a.href = url;              // saved as https://... now
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.textContent = label;
        box.appendChild(a);
      }
    }

    async function loadArtist(){
      setStatus("Loading…");

      const { data, error } = await supabase
        .from(TABLE)
        .select(`
          id, created_at,
          name, channel_hand, youtube_chan, default_lane, default_perso,
          spotify_url, bandcamp_ur, apple_music_, soundcloud_u,
          youtube_url, website_url, beacons_url, tiktok_url, facebook_url
        `)
        .eq("id", id)
        .single();

      if (error) { setStatus("Error: " + error.message); console.error(error); return; }

      $("title").textContent = `Edit Artist: ${data.name || "(Untitled)"}`;
      $("name").value = data.name ?? "";
      $("channel_hand").value = data.channel_hand ? ("@" + String(data.channel_hand).replace(/^@/, "")) : "";
      $("youtube_chan").value = data.youtube_chan ?? "";
      $("default_lane").value = data.default_lane ?? "";
      $("default_perso").value = data.default_perso ?? "";

      $("spotify_url").value = data.spotify_url ?? "";
      $("bandcamp_ur").value = data.bandcamp_ur ?? "";
      $("apple_music_").value = data.apple_music_ ?? "";
      $("soundcloud_u").value = data.soundcloud_u ?? "";
      $("youtube_url").value = data.youtube_url ?? "";
      $("website_url").value = data.website_url ?? "";
      $("beacons_url").value = data.beacons_url ?? "";
      $("tiktok_url").value = data.tiktok_url ?? "";
      $("facebook_url").value = data.facebook_url ?? "";

      buildQuickLinks(data);
      setStatus("Loaded.");
    }

    async function saveArtist(){
      const name = $("name").value.trim();
      if (!name) return alert("Name is required.");

      setStatus("Saving…");

      const payload = {
        name,
        channel_hand: normalizeHandle($("channel_hand").value),
        youtube_chan: $("youtube_chan").value.trim() || null,
        default_lane: $("default_lane").value || null,
        default_perso: $("default_perso").value.trim() || null,

        spotify_url: normalizeUrl($("spotify_url").value),
        bandcamp_ur: normalizeUrl($("bandcamp_ur").value),
        apple_music_: normalizeUrl($("apple_music_").value),
        soundcloud_u: normalizeUrl($("soundcloud_u").value),
        youtube_url: normalizeUrl($("youtube_url").value),
        website_url: normalizeUrl($("website_url").value),
        beacons_url: normalizeUrl($("beacons_url").value),
        tiktok_url: normalizeUrl($("tiktok_url").value),
        facebook_url: normalizeUrl($("facebook_url").value),
      };

      const { error } = await supabase.from(TABLE).update(payload).eq("id", id);
      if (error) { setStatus("Error: " + error.message); console.error(error); return; }

      setStatus("Saved ✅");
      await loadArtist();
    }

    $("btnSave").onclick = saveArtist;
    $("btnBack").onclick = () => window.location.href = `./artist-view.html?id=${encodeURIComponent(id)}`;
    $("btnLogout").onclick = async () => {
      await supabase.auth.signOut();
      window.location.href = "./index.html";
    };

    loadArtist();
  </script>
</body>
</html>
