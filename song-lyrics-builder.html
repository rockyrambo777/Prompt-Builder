<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SVS System – Lyrics + Suno Builder</title>
  <style>:root{
  --bg:#0b0f19; --card:#121a2a; --card2:#0f1626; --border:#23304a;
  --muted:#92a4c7; --text:#e8eefc; --primary:#2f6fed; --danger:#d14b4b;
  --chip:#1c273f; --ok:#7CFFB2; --warn:#ffcc66;
}
body { font-family: Arial, sans-serif; background:var(--bg); color:var(--text); margin:0; }
.wrap { max-width: 1400px; margin: 0 auto; padding: 24px; }
.top { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
.muted { color:var(--muted); font-size: 14px; }
.btn { padding:10px 12px; border-radius:12px; border:1px solid #2a3a5c; background:#121a2a; color:var(--text); cursor:pointer; font-weight:800; }
.btn.primary { background:var(--primary); border:none; }
.btn.secondary { background:#1c273f; border:1px solid #2a3a5c; }
.btn.danger { background:var(--danger); border:none; }
.btn.copy { background:#16315f; border:1px solid #2a3a5c; }
.btn.small { padding:8px 10px; font-size:12px; border-radius:10px; }
.card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:18px; margin-top:14px; }
.grid { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:12px; }
@media (max-width: 980px){ .grid { grid-template-columns: 1fr; } }
.grid3 { display:grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap:12px; }
@media (max-width: 1100px){ .grid3 { grid-template-columns: 1fr; } }
label { font-size:12px; color:var(--muted); display:block; margin:8px 0 6px; }
input, select, textarea {
  padding:12px; border-radius:12px; border:1px solid #2a3a5c;
  background:var(--card2); color:var(--text); width:100%;
  box-sizing:border-box;
}
textarea { min-height: 160px; resize: vertical; }
.row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
.divider{ height:1px; background:#22304a; margin:14px 0; }
.chips { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
.chip { font-size:12px; padding:6px 10px; border-radius:999px; border:1px solid #2a3a5c; background:var(--chip); color:var(--text); }
.mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
.list{ max-height: 420px; overflow:auto; border:1px solid #2a3a5c; border-radius:14px; background:var(--card2); }
.item{ padding:12px; border-bottom:1px solid #22304a; cursor:pointer; }
.item:last-child{ border-bottom:none; }
.item:hover{ background:#111b2f; }
.item.active{ background:#142042; }
.itemTop{ display:flex; justify-content:space-between; gap:10px; align-items:center; }
.itemTitle{ font-weight:900; }
.checkRow{ display:flex; gap:14px; flex-wrap:wrap; align-items:center; margin-top:10px; }
.checkRow label{ margin:0; display:flex; gap:8px; align-items:center; color:var(--text); font-size:13px; }
input[type="checkbox"], input[type="radio"]{ width:18px; height:18px; accent-color: var(--primary); }
.pill{
  display:inline-block; padding:4px 10px; border-radius:999px;
  border:1px solid #2a3a5c; background:var(--card2); font-size:12px;
}
.pill.ok{ border-color:#1f6b45; }
.pill.warn{ border-color:#6b4c1d; }
.pill.bad{ border-color:#6b2a2a; }
.hint { font-size:12px; color:var(--muted); margin-top:6px; line-height:1.4; }</style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1 style="margin:0;">Lyrics + Suno Builder</h1>
        <div id="who" class="muted"></div>
      </div>
      <div class="row">
        <button id="btnBack" class="btn secondary">Back</button>
        <button id="btnHome" class="btn secondary">Home</button>
        <button id="btnLogout" class="btn danger">Logout</button>
      </div>
    </div>

    <div class="card">
      <div class="row" style="justify-content:space-between;">
        <div>
          <div id="statusLine" class="muted">Loading…</div>
          <div class="chips" id="chips"></div>
        </div>
        <div class="row">
          <button id="btnCopyPrompt" class="btn copy">Copy Prompt</button>
          <button id="btnBuildPrompt" class="btn primary">Build Creation Prompt</button>
        </div>
      </div>

      <div class="divider"></div>

      <div class="grid">
        <div>
          <label>Song Title</label>
          <input id="title" />
          <label>Track #</label>
          <input id="track_number" type="number" min="1" step="1" />
          <label>Keywords</label>
          <input id="keywords" placeholder="faith, authority, bold praise…" />
          <label>Scripture</label>
          <input id="scripture" placeholder="Ephesians 6:10…" />
        </div>
        <div>
          <label>Structure</label>
          <select id="structure">
            <option value="standard" selected>Verse 1, Pre, Chorus, Verse 2, Pre, Chorus, Bridge, Final Chorus</option>
            <option value="simple">Verse 1, Chorus, Verse 2, Chorus, Bridge, Final Chorus</option>
            <option value="anthem">Verse 1, Pre, Chorus, Verse 2, Pre, Chorus, Bridge, Key Change, Final Chorus</option>
          </select>

          <label>Length target</label>
          <select id="length">
            <option value="3-4" selected>3–4 minutes</option>
            <option value="2-3">2–3 minutes</option>
            <option value="4-5">4–5 minutes</option>
          </select>

          <label>Notes (optional)</label>
          <textarea id="notes" class="mono" placeholder="Any album mood/style notes, instrumentation idea, etc."></textarea>
        </div>
      </div>

      <div class="divider"></div>

      <div class="grid">
        <div>
          <label>ChatGPT Prompt Output</label>
          <textarea id="output" class="mono" placeholder="Click Build Creation Prompt…"></textarea>
          <div class="row" style="margin-top:10px;">
            <button id="btnClearOut" class="btn">Clear</button>
            <button id="btnCopyOut" class="btn copy">Copy</button>
          </div>
        </div>

        <div>
          <label>Paste ChatGPT Results Here</label>
          <textarea id="working" class="mono" placeholder="Paste UPDATED_SUNO_PROMPT + LYRICS here, then paste into the fields below…"></textarea>

          <div class="divider"></div>
          <label>New Suno Prompt (paste from ChatGPT)</label>
          <textarea id="suno_prompt" class="mono"></textarea>

          <label>New Lyrics (paste from ChatGPT)</label>
          <textarea id="lyrics" class="mono" style="min-height:260px;"></textarea>

          <div class="row" style="margin-top:10px;">
            <button id="btnSaveSong" class="btn primary">Save to Song</button>
            <button id="btnReload" class="btn">Reload</button>
          </div>
          <div class="hint">This saves the generated Suno prompt + lyrics back onto the song record.</div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase, requireSessionOrRedirect } from "./app.js";
    const $ = (id) => document.getElementById(id);

    const session = await requireSessionOrRedirect();
    $("who").textContent = `Signed in: ${session.user.email}`;

    const SONGS = "songs";
    const ALBUMS = "albums";
    const ARTISTS = "artists";

    const params = new URLSearchParams(window.location.search);
    const songId = params.get("song_id");
    const albumId = params.get("album_id"); // optional (for back link)

    let song = null, album = null, artist = null;

    function safe(v){ return (v===null||v===undefined) ? "" : String(v); }
    function trimOrNone(v){ const t=safe(v).trim(); return t ? t : "(none)"; }

    function setChips(){
      const box = $("chips");
      box.innerHTML = "";
      const add = (t) => {
        const s = document.createElement("span");
        s.className = "chip";
        s.textContent = t;
        box.appendChild(s);
      };
      if (artist?.name) add("artist: " + artist.name);
      if (album?.title) add("album: " + album.title);
      if (song?.title) add("song: " + song.title);
    }

    function artistDNABlock(ar){
      if (!ar) return "- (No artist loaded)";
      const lines = [];
      const mg = safe(ar.main_genre).trim();
      const sg = safe(ar.secondary_genre).trim();
      if (mg || sg) lines.push(`- Genres: ${[mg, sg].filter(Boolean).join(" / ")}`);
      if (safe(ar.voice_identity).trim()) lines.push(`- Voice Identity: ${ar.voice_identity}`);
      if (safe(ar.suno_voice_anchor).trim()) lines.push(`- Suno Voice Anchor: ${ar.suno_voice_anchor}`);
      if (safe(ar.must_include).trim()) lines.push(`- Must Include: ${ar.must_include}`);
      if (safe(ar.never_include).trim()) lines.push(`- Never Include: ${ar.never_include}`);
      if (safe(ar.default_perso).trim()) lines.push(`- Persona: ${ar.default_perso}`);
      if (safe(ar.default_lane).trim()) lines.push(`- Lane: ${ar.default_lane}`);
      return lines.length ? lines.join("\n") : "- (No Artist DNA set yet)";
    }

    async function load(){
      if (!songId) {
        $("statusLine").textContent = "Missing song_id in URL.";
        return;
      }
      $("statusLine").textContent = "Loading song…";
      const { data: s, error: e1 } = await supabase.from(SONGS).select("*").eq("id", songId).single();
      if (e1) {
        $("statusLine").textContent = "Error: " + e1.message;
        return;
      }
      song = s;

      $("title").value = safe(song.title);
      $("track_number").value = song.track_number ?? "";
      $("keywords").value = safe(song.keywords);
      $("scripture").value = safe(song.scripture);
      $("suno_prompt").value = safe(song.suno_prompt);
      $("lyrics").value = safe(song.lyrics);

      const aId = song.album_id;
      if (aId){
        const { data: a } = await supabase.from(ALBUMS).select("*").eq("id", aId).single();
        album = a || null;
      }
      if (album?.artist_id){
        const { data: ar } = await supabase.from(ARTISTS).select("*").eq("id", album.artist_id).single();
        artist = ar || null;
      }

      setChips();
      $("statusLine").textContent = "Ready ✅";
    }

    function buildPrompt(){
      if (!song) return;

      const out = [];
      out.push("Write original song lyrics AND a Suno prompt for the track below.");
      out.push("");
      out.push("Return ONLY these sections (no extra commentary):");
      out.push("UPDATED_SUNO_PROMPT:");
      out.push("LYRICS:");
      out.push("```");
      out.push("(lyrics here with section headings)");
      out.push("```");
      out.push("");
      out.push("Song:");
      out.push(`- Title: ${safe($("title").value)}`);
      out.push(`- Lead type: ${safe(song.lead_type || song.lead || "solo")}`);
      out.push(`- Keywords: ${trimOrNone($("keywords").value)}`);
      out.push(`- Scripture (optional): ${trimOrNone($("scripture").value)}`);
      out.push(`- Length: ${$("length").value} minutes`);
      out.push(`- Structure: ${$("structure").value}`);
      out.push(`- Notes: ${trimOrNone($("notes").value)}`);
      out.push("");
      out.push("Artist DNA (must follow):");
      out.push(artistDNABlock(artist));
      out.push("");
      out.push("Rules:");
      out.push("- Suno prompt must include instruments (never instrument-less).");
      out.push("- Keep voice identity consistent (use Suno voice anchor if provided).");
      out.push("- Keep genre aligned to artist main/secondary genres.");
      out.push("- Gospel/worship content must be clean language, no profanity.");
      out.push("- Make lyrics singable, not overly long lines.");
      out.push("- UPDATED_SUNO_PROMPT must be <= 1000 characters.");

      $("output").value = out.join("\n");
      $("statusLine").textContent = "Prompt built ✅";
    }

    async function saveSong(){
      if (!song) return;
      $("statusLine").textContent = "Saving…";
      const payload = {
        title: $("title").value,
        track_number: $("track_number").value ? Number($("track_number").value) : null,
        keywords: $("keywords").value || null,
        scripture: $("scripture").value || null,
        suno_prompt: $("suno_prompt").value || null,
        lyrics: $("lyrics").value || null,
        updated_at: new Date().toISOString()
      };
      const { error } = await supabase.from(SONGS).update(payload).eq("id", song.id);
      if (error) {
        $("statusLine").textContent = "Save error: " + error.message;
        return;
      }
      $("statusLine").textContent = "Saved ✅";
      await load();
    }

    $("btnBuildPrompt").onclick = buildPrompt;
    $("btnCopyOut").onclick = async () => {
      const t = $("output").value || "";
      if (!t.trim()) return alert("Nothing to copy.");
      await navigator.clipboard.writeText(t);
      $("statusLine").textContent = "Copied ✅";
    };
    $("btnCopyPrompt").onclick = $("btnCopyOut").onclick;
    $("btnClearOut").onclick = () => $("output").value = "";

    $("btnSaveSong").onclick = saveSong;
    $("btnReload").onclick = load;

    $("btnBack").onclick = () => {
      if (albumId) window.location.href = "./production.html?album_id=" + encodeURIComponent(albumId) + "&song_id=" + encodeURIComponent(songId);
      else window.history.back();
    };
    $("btnHome").onclick = () => window.location.href = "./home.html";
    $("btnLogout").onclick = async () => {
      await supabase.auth.signOut();
      window.location.href = "./index.html";
    };

    await load();
  </script>
</body>
</html>
