<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SVS System – Video Production</title>
  <style>
    :root{
      --bg:#0b0f19; --card:#121a2a; --card2:#0f1626; --border:#23304a;
      --muted:#92a4c7; --text:#e8eefc; --primary:#2f6fed; --danger:#d14b4b;
    }
    body { font-family: Arial, sans-serif; background:var(--bg); color:var(--text); margin:0; }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .top { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
    .muted { color:var(--muted); font-size: 14px; }
    .btn { padding:12px 14px; border-radius:12px; border:1px solid #2a3a5c; background:#121a2a; color:var(--text); cursor:pointer; font-weight:800; }
    .btn.primary { background:var(--primary); border:none; }
    .btn.secondary { background:#1c273f; border:1px solid #2a3a5c; }
    .btn.danger { background:var(--danger); border:none; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:18px; margin-top:14px; }
    label { font-size:12px; color:var(--muted); display:block; margin:10px 0 6px; }
    input, textarea, select {
      padding:12px; border-radius:12px; border:1px solid #2a3a5c;
      background:var(--card2); color:var(--text); width:100%;
      box-sizing:border-box;
    }
    textarea { min-height: 120px; resize: vertical; }
    .row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
    .grid2 { display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
    @media (max-width: 980px){ .grid2 { grid-template-columns: 1fr; } }
    .sectionTitle { margin: 0 0 10px; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    .checkRow { display:flex; align-items:center; gap:10px; margin:10px 0; }
    input[type="checkbox"]{ width:20px; height:20px; accent-color: var(--primary); }
    .pillbar { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .pill { padding:6px 10px; border-radius:999px; border:1px solid #2a3a5c; background:#0f1626; font-size:12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1 style="margin:0;" id="title">Video Production</h1>
        <div id="who" class="muted"></div>
        <div id="statusLine" class="muted"></div>
        <div id="pills" class="pillbar"></div>
      </div>
      <div class="row">
        <button id="btnBack" class="btn secondary">Back</button>
        <button id="btnLogout" class="btn danger">Logout</button>
      </div>
    </div>

    <div class="card">
      <div class="row" style="justify-content:space-between;">
        <div class="muted">Mark Long / Short as done + store style, notes, and upload URLs.</div>
        <div class="row">
          <button id="btnOpenLyrics" class="btn secondary">Open Lyrics</button>
          <button id="btnOpenSunoPack" class="btn secondary">Open Suno Pack</button>
          <button id="btnSave" class="btn primary">Save</button>
        </div>
      </div>

      <div class="grid2" style="margin-top:14px;">
        <!-- LONG FORM -->
        <div class="card" style="margin-top:0;">
          <h2 class="sectionTitle">Long Form</h2>

          <div class="checkRow">
            <input id="longform_done" type="checkbox" />
            <label for="longform_done" style="margin:0;">Long form video created</label>
          </div>

          <label for="longform_style">Long Form Style / Tool</label>
          <select id="longform_style">
            <option value="">(select)</option>
            <option value="CapCut Lyric Video">CapCut Lyric Video</option>
            <option value="Canva Background + CapCut">Canva Background + CapCut</option>
            <option value="Revid AI Video">Revid AI Video</option>
            <option value="Whisk Image + Edit">Whisk Image + Edit</option>
            <option value="Other">Other</option>
          </select>

          <label for="longform_youtube_url">YouTube URL (Long Form)</label>
          <input id="longform_youtube_url" placeholder="https://youtube.com/..." />

          <label for="longform_notes">Notes (Long Form)</label>
          <textarea id="longform_notes" class="mono" placeholder="Steps, settings, templates used..."></textarea>
        </div>

        <!-- SHORT -->
        <div class="card" style="margin-top:0;">
          <h2 class="sectionTitle">Short</h2>

          <div class="checkRow">
            <input id="short_done" type="checkbox" />
            <label for="short_done" style="margin:0;">Short created</label>
          </div>

          <label for="short_style">Short Style / Tool</label>
          <select id="short_style">
            <option value="">(select)</option>
            <option value="CapCut Short (Lyrics)">CapCut Short (Lyrics)</option>
            <option value="Image-to-Video (10s)">Image-to-Video (10s)</option>
            <option value="Revid AI Short">Revid AI Short</option>
            <option value="Whisk + Grok I2V">Whisk + Grok I2V</option>
            <option value="Other">Other</option>
          </select>

          <label for="short_youtube_url">YouTube URL (Short)</label>
          <input id="short_youtube_url" placeholder="https://youtube.com/shorts/..." />

          <label for="short_notes">Notes (Short)</label>
          <textarea id="short_notes" class="mono" placeholder="Text overlays, hook lines, timing..."></textarea>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase, requireSessionOrRedirect } from "./app.js";
    const $ = (id) => document.getElementById(id);

    const session = await requireSessionOrRedirect();
    $("who").textContent = `Signed in: ${session.user.email}`;

    const params = new URLSearchParams(window.location.search);
    const songId = params.get("id");
    const albumId = params.get("album_id");

    if (!songId) { alert("Missing song id"); window.location.href = "./production.html"; }

    let song = null;

    $("btnLogout").onclick = async () => {
      await supabase.auth.signOut();
      window.location.href = "./index.html";
    };

    $("btnBack").onclick = () => {
      window.location.href = "./production.html";
    };

    $("btnOpenLyrics").onclick = () => {
      window.location.href = `./song-edit.html?id=${encodeURIComponent(songId)}&album_id=${encodeURIComponent(albumId || "")}`;
    };

    $("btnOpenSunoPack").onclick = () => {
      window.location.href = `./song-suno.html?id=${encodeURIComponent(songId)}&album_id=${encodeURIComponent(albumId || "")}`;
    };

    function pill(txt){
      const d = document.createElement("div");
      d.className = "pill";
      d.textContent = txt;
      return d;
    }

    function norm(v){
      const s = (v ?? "").toString().trim();
      return s ? s : null;
    }

    async function load(){
      $("statusLine").textContent = "Loading…";
      const { data, error } = await supabase.from("songs").select("*").eq("id", songId).single();
      if (error) { $("statusLine").textContent = "Error: " + error.message; return; }
      song = data;

      $("title").textContent = `Video Production: ${song.title || "(Untitled)"}`;

      // fill fields
      $("longform_done").checked = !!song.longform_done;
      $("short_done").checked = !!song.short_done;

      $("longform_style").value = song.longform_style || "";
      $("short_style").value = song.short_style || "";

      $("longform_youtube_url").value = song.longform_youtube_url || "";
      $("short_youtube_url").value = song.short_youtube_url || "";

      $("longform_notes").value = song.longform_notes || "";
      $("short_notes").value = song.short_notes || "";

      // pills
      const pills = $("pills");
      pills.innerHTML = "";
      pills.appendChild(pill(`song: ${song.id}`));
      if (song.track_number) pills.appendChild(pill(`track: ${song.track_number}`));
      if (albumId) pills.appendChild(pill(`album_id: ${albumId}`));

      $("statusLine").textContent = "Ready.";
    }

    $("btnSave").onclick = async () => {
      $("statusLine").textContent = "Saving…";

      const payload = {
        longform_done: $("longform_done").checked,
        short_done: $("short_done").checked,

        longform_style: norm($("longform_style").value),
        short_style: norm($("short_style").value),

        longform_youtube_url: norm($("longform_youtube_url").value),
        short_youtube_url: norm($("short_youtube_url").value),

        longform_notes: norm($("longform_notes").value),
        short_notes: norm($("short_notes").value),
      };

      const { error } = await supabase.from("songs").update(payload).eq("id", songId);
      if (error) { $("statusLine").textContent = "Error: " + error.message; return; }

      $("statusLine").textContent = "Saved ✅";
      // go back automatically after save:
      window.location.href = "./production.html";
    };

    await load();
  </script>
</body>
</html>
