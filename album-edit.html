<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SVS System – Album Studio (Edit)</title>
  <style>
    :root{
      --bg:#0b0f19; --card:#121a2a; --card2:#0f1626; --border:#23304a;
      --muted:#92a4c7; --text:#e8eefc; --primary:#2f6fed; --danger:#d14b4b;
      --chip:#1c273f;
    }
    body { font-family: Arial, sans-serif; background:var(--bg); color:var(--text); margin:0; }
    .wrap { max-width: 1300px; margin: 0 auto; padding: 24px; }
    .top { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
    .muted { color:var(--muted); font-size: 14px; }
    .btn { padding:10px 12px; border-radius:12px; border:1px solid #2a3a5c; background:#121a2a; color:var(--text); cursor:pointer; font-weight:800; }
    .btn.primary { background:var(--primary); border:none; }
    .btn.secondary { background:#1c273f; border:1px solid #2a3a5c; }
    .btn.danger { background:var(--danger); border:none; }
    .btn.copy { background:#16315f; border:1px solid #2a3a5c; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:18px; margin-top:14px; }
    .grid { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:12px; }
    @media (max-width: 980px){ .grid { grid-template-columns: 1fr; } }
    label { font-size:12px; color:var(--muted); display:block; margin:8px 0 6px; }
    input, select, textarea {
      padding:12px; border-radius:12px; border:1px solid #2a3a5c;
      background:var(--card2); color:var(--text); width:100%;
      box-sizing:border-box;
    }
    textarea { min-height: 140px; resize: vertical; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .chips { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .chip { font-size:12px; padding:6px 10px; border-radius:999px; border:1px solid #2a3a5c; background:var(--chip); color:var(--text); }
    table { width:100%; border-collapse: collapse; margin-top:10px; }
    th, td { border-bottom:1px solid #22304a; padding:10px; text-align:left; vertical-align: top; }
    th { color:var(--muted); font-size:12px; }
    .tiny { width: 70px; }
    .mini { width: 200px; }
    .wide { width: 420px; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    .sectionTitle { margin: 0 0 10px; }
    .hint { font-size:12px; color:var(--muted); margin-top:6px; line-height:1.4; }

    .checkCell { text-align:center; }
    input[type="checkbox"]{ width:18px; height:18px; accent-color: var(--primary); }

    .linkIcon {
      font-size:18px; cursor:pointer; user-select:none;
      padding: 6px 10px; border-radius:10px; border:1px solid #2a3a5c; background:#0f1626;
      display:inline-flex; align-items:center; justify-content:center;
    }
    .linkIcon[aria-disabled="true"]{ opacity:0.35; cursor:not-allowed; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1 style="margin:0;" id="pageTitle">Album Studio</h1>
        <div id="who" class="muted"></div>
      </div>
      <div class="row">
        <button id="btnBack" class="btn secondary">Back</button>
        <button id="btnLogout" class="btn danger">Logout</button>
      </div>
    </div>

    <div class="card">
      <div class="row" style="justify-content:space-between;">
        <div>
          <div id="statusLine" class="muted"></div>
          <div class="chips" id="chips"></div>
        </div>
        <div class="row">
          <button id="btnCopyPrompt" class="btn copy">Copy Prompt</button>
          <button id="btnCreatePlaylist" class="btn secondary">Create Playlist</button>
          <button id="btnSave" class="btn primary">Save</button>
          <button id="btnDelete" class="btn danger">Delete</button>
        </div>
      </div>

      <h2 class="sectionTitle" style="margin-top:18px;">Album Info</h2>
      <div class="grid">
        <div>
          <label for="status">Status</label>
          <select id="status">
            <option value="draft">draft</option>
            <option value="ideation">ideation</option>
            <option value="approved">approved</option>
            <option value="producing">producing</option>
            <option value="released">released</option>
          </select>
        </div>

        <div>
          <label for="titleInput">Final Album Title</label>
          <input id="titleInput" placeholder="Paste the recommended album title here">
        </div>

        <div><label for="theme">Theme</label><input id="theme"></div>
        <div><label for="style">Style / Lane Hint</label><input id="style"></div>
        <div><label for="mood">Mood</label><input id="mood"></div>

        <div>
          <label for="lead_type">Lead Type</label>
          <select id="lead_type">
            <option value="solo">solo</option>
            <option value="solo+choir">solo + choir</option>
            <option value="choir">choir</option>
          </select>
        </div>

        <div><label for="total_tracks">Tracks</label><input id="total_tracks" type="number" min="1" max="50"></div>
        <div><label for="notes">Notes</label><input id="notes"></div>
      </div>

      <h2 class="sectionTitle" style="margin-top:18px;">ChatGPT Prompt (stored)</h2>
      <textarea id="prompt" class="mono"></textarea>

      <h2 class="sectionTitle" style="margin-top:18px;">Working Results (paste from ChatGPT)</h2>
      <div class="grid">
        <div style="grid-column: 1 / -1;">
          <label for="working_tracks">TRACKS_JSON</label>
          <textarea id="working_tracks" class="mono"></textarea>
          <div class="hint">Click “Apply Tracks → Songs” to create songs.</div>
        </div>
      </div>

      <div class="row" style="margin-top:10px;">
        <button id="btnApplyTracks" class="btn secondary">Apply Tracks → Songs</button>
        <button id="btnImportExisting" class="btn secondary">Import Existing Song</button>
        <div class="muted">Creates songs (title + suno_prompt when provided).</div>
      </div>

      <h2 class="sectionTitle" style="margin-top:18px;">Songs (final)</h2>
      <table>
        <thead>
          <tr>
            <th class="tiny">#</th>
            <th class="mini">Title</th>
            <th class="wide">Suno Prompt</th>
            <th class="mini">Keywords</th>
            <th class="mini scriptureCol">Scripture</th>
            <th class="tiny">Lyrics ✅</th>
            <th class="tiny">Long ✅</th>
            <th class="tiny">Short ✅</th>
            <th class="tiny">Links 🔗</th>
            <th class="mini">Actions</th>
          </tr>
        </thead>
        <tbody id="songsBody"></tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { supabase, requireSessionOrRedirect } from "./app.js";
    const $ = (id) => document.getElementById(id);

    const ALBUMS = "albums";
    const SONGS = "songs";
    const ARTISTS = "artists";

    const session = await requireSessionOrRedirect();
    $("who").textContent = `Signed in: ${session.user.email}`;

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");
    if (!id) { alert("Missing album id"); window.location.href = "./albums.html"; }

    let album = null;
    let artist = null;
    let songs = [];

    
    function isGospelArtist(ar){
      const g = ((ar?.main_genre||"") + " " + (ar?.secondary_genre||"")).toLowerCase();
      return g.includes("gospel") || g.includes("christ");
    }
function safeText(v){ return (v === null || v === undefined) ? "" : String(v); }

    function parseTracksInput(text){
      const t = (text || "").trim();
      if (!t) return null;
      try { const v = JSON.parse(t); if (Array.isArray(v)) return v; } catch {}
      const lines = t.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
      if (lines.length) return lines;
      const parts = t.split(",").map(s => s.trim()).filter(Boolean);
      return parts.length ? parts : null;
    }

    function setChips(){
      const chips = $("chips");
      chips.innerHTML = "";
      const vals = [
        album?.status ? ("status: " + album.status) : null,
        artist?.name ? ("artist: " + artist.name) : null,
        album?.total_tracks ? ("tracks: " + album.total_tracks) : null,
        album?.lead_type ? ("lead: " + album.lead_type) : null,
      ].filter(Boolean);
      for (const v of vals){
        const s = document.createElement("span");
        s.className = "chip";
        s.textContent = v;
        chips.appendChild(s);
      }
    }

    function escAttr(s){
      return safeText(s).replaceAll("&","&amp;").replaceAll('"','&quot;').replaceAll("<","&lt;").replaceAll(">","&gt;");
    }

    function hasLyricsText(song){
      const lyr = (song?.lyrics ?? "").toString().trim();
      return lyr.length > 0;
    }

    // ✅ AUTO STATUS: approved -> producing when ALL songs have lyrics + suno_share_url
    async function maybeAutoSetProducing(){
      if (!album || !songs) return;

      const current = (album.status || "").toLowerCase();
      if (current !== "approved") return;

      const allDone = songs.length > 0 && songs.every(s => {
        const lyrOk = ((s.lyrics ?? "").toString().trim().length > 0);
        const sunoOk = ((s.suno_share_url ?? "").toString().trim().length > 0);
        return lyrOk && sunoOk;
      });

      if (!allDone) return;

      const { error } = await supabase.from(ALBUMS).update({ status: "producing" }).eq("id", id);
      if (error) {
        console.warn("Auto status update failed:", error.message);
        return;
      }

      album.status = "producing";
      $("status").value = "producing";
      setChips();
      $("statusLine").textContent = "All tracks complete → status auto-set to producing ✅";
    }

    function renderSongs(){
      const body = $("songsBody");
      body.innerHTML = "";
      if (!songs.length){
        body.innerHTML = "<tr><td colspan='10' class='muted'>No songs yet. Apply tracks.</td></tr>";
        return;
      }
      songs.sort((a,b) => a.track_number - b.track_number);

      for (const s of songs){
        const tr = document.createElement("tr");
        tr.dataset.songId = s.id;

        const checked = hasLyricsText(s) ? "checked" : "";
        const url = (s.suno_share_url || "").trim();
        const linkDisabled = url ? "" : "aria-disabled='true'";
        const ytUrl = (s.longform_youtube_url || s.youtube_url || "").trim();
        const ytDisabled = ytUrl ? "" : "aria-disabled='true'";

        tr.innerHTML = `
          <td class="tiny"><b>${s.track_number}</b></td>
          <td><input data-title value="${escAttr(s.title)}"></td>
          <td><textarea data-suno class="mono" style="min-height:90px;">${safeText(s.suno_prompt || "")}</textarea></td>
          <td><input data-keywords value="${escAttr(s.keywords)}" placeholder="optional"></td>
          <td class="scriptureCol"><input data-scripture value="${escAttr(s.scripture)}" placeholder="optional"></td>
          <td class="checkCell"><input type="checkbox" data-lyrics-done ${checked} disabled></td>
          <td class="checkCell"><input type="checkbox" data-long_done ${s.longform_done ? "checked" : ""}></td>
          <td class="checkCell"><input type="checkbox" data-short_done ${s.short_done ? "checked" : ""}></td>
          <td class="checkCell">
            <div class="row" style="gap:8px; justify-content:center;">
              <span class="linkIcon" data-suno_link ${linkDisabled} title="${url ? "Open Suno" : "No Suno link yet"}">🔗</span>
              <span class="linkIcon" data-yt_link ${ytDisabled} title="${ytUrl ? "Open YouTube" : "No YouTube link yet"}">▶️</span>
            </div>
          </td>
          <td>
            <button class="btn secondary" data-lyrics>Production</button>
            <button class="btn secondary" data-suno-pack>Suno Pack</button>
            <button class="btn primary" data-packaging>Packaging</button>
          </td>
        `;
        body.appendChild(tr);

        // Save flags to DB
        const longCb = tr.querySelector("[data-long_done]");
        const shortCb = tr.querySelector("[data-short_done]");
        const updateFlag = async (field, val) => {
          const sid = tr.dataset.songId;
          const { error } = await supabase.from(SONGS).update({ [field]: val }).eq("id", sid);
          if (error) alert("Save error: " + error.message);
        };
        longCb && (longCb.onchange = () => updateFlag("longform_done", longCb.checked));
        shortCb && (shortCb.onchange = () => updateFlag("short_done", shortCb.checked));

        tr.querySelector("[data-lyrics]").onclick = () => {
          window.location.href = `./production.html?id=${encodeURIComponent(s.id)}&album_id=${encodeURIComponent(id)}`;
        };

        tr.querySelector("[data-suno-pack]").onclick = () => {
          window.location.href = `./song-suno.html?id=${encodeURIComponent(s.id)}&album_id=${encodeURIComponent(id)}`;
        };


        tr.querySelector("[data-packaging]").onclick = () => {
          window.location.href = `./song-packaging.html?song_id=${encodeURIComponent(s.id)}&album_id=${encodeURIComponent(id)}`;
        };

        const sunoEl = tr.querySelector("[data-suno_link]");
        const ytEl = tr.querySelector("[data-yt_link]");
        sunoEl && (sunoEl.onclick = () => {
          if (!url) return;
          window.open(url, "_blank", "noopener,noreferrer");
        });
        ytEl && (ytEl.onclick = () => {
          if (!ytUrl) return;
          window.open(ytUrl, "_blank", "noopener,noreferrer");
        });
      }
    }

    async function loadAlbum(){
      $("statusLine").textContent = "Loading…";

      const { data: a, error } = await supabase.from(ALBUMS).select("*").eq("id", id).single();
      if (error) { $("statusLine").textContent = "Error: " + error.message; return; }
      album = a;

      const { data: art, error: e2 } = await supabase.from(ARTISTS).select("id,name,main_genre,secondary_genre").eq("id", album.artist_id).single();
      if (!e2) artist = art;
      // Determine if this artist is Gospel/Christian (controls scripture fields)
      const gText = `${(art?.main_genre||"")} ${(art?.secondary_genre||"")}`.toLowerCase();
      window.__isGospelArtist = (gText.includes("gospel") || gText.includes("christ"));
      document.querySelectorAll(".scriptureCol").forEach(el => {
        el.style.display = window.__isGospelArtist ? "" : "none";
      });

      // Default playlist option (if enabled, album-level playlist creation is hidden)
      window.__artistHasDefaultPlaylist = !!art?.default_playlist_enabled;
      if (window.__artistHasDefaultPlaylist) {
        const btn = $("btnCreatePlaylist");
        if (btn) btn.style.display = "none";
      }
      window.__artistDefaultPlaylistTitle = art?.default_playlist_title || "";
      window.__artistDefaultPlaylistDescription = art?.default_playlist_description || "";


      const { data: s, error: e3 } = await supabase.from(SONGS).select("*").eq("album_id", id).order("track_number", { ascending: true });
      songs = e3 ? [] : (s || []);

      $("pageTitle").textContent = `Album Studio: ${album.title || "(Draft)"}`;
      $("status").value = album.status || "draft";
      $("titleInput").value = album.title || "";
      $("theme").value = album.theme || "";
      $("style").value = album.style || "";
      $("mood").value = album.mood || "";
      $("lead_type").value = album.lead_type || "solo";
      $("total_tracks").value = album.total_tracks || 12;
      $("notes").value = album.notes || "";
      $("prompt").value = album.chatgpt_prompt || "";
      $("working_tracks").value = "";

      $("statusLine").textContent = `Album ID: ${album.id}`;
      setChips();
      renderSongs();

      // ✅ AFTER songs load + render, auto status update if complete
      await maybeAutoSetProducing();
    }

    function normalizeTracks(arr){
      if (!Array.isArray(arr)) return [];
      if (arr.every(x => typeof x === "string")) {
        return arr.map((title, idx) => ({
          track_number: idx + 1,
          title: String(title).replace(/^"+|"+$/g,"").trim(),
          suno_prompt: null, keywords: null, scripture: null,
        })).filter(t => t.title);
      }
      return arr.map((x, idx) => {
        const track_number = Number(x.track_number || (idx+1));
        return {
          track_number,
          title: safeText(x.title).trim(),
          suno_prompt: (x.suno_prompt ? safeText(x.suno_prompt).trim() : null),
          keywords: (x.keywords ? safeText(x.keywords).trim() : null),
          scripture: (gospelArtist && x.scripture ? safeText(x.scripture).trim() : null),
        };
      }).filter(t => t.title);
    }

    async function saveAlbum(){
      const raw = parseTracksInput($("working_tracks").value);
      const tracks = raw ? normalizeTracks(raw) : null;

      const payload = {
        status: $("status").value,
        title: $("titleInput").value.trim() || null,
        theme: $("theme").value.trim() || null,
        style: $("style").value.trim() || null,
        mood: $("mood").value.trim() || null,
        lead_type: $("lead_type").value || "solo",
        total_tracks: Number($("total_tracks").value || 12),
        notes: $("notes").value.trim() || null,
        chatgpt_prompt: $("prompt").value || null,
        working_tracklist: tracks && tracks.length ? tracks : null,
      };

      $("statusLine").textContent = "Saving…";
      const { error } = await supabase.from(ALBUMS).update(payload).eq("id", id);
      if (error) { $("statusLine").textContent = "Error: " + error.message; return; }

      const rows = [...document.querySelectorAll("#songsBody tr[data-song-id]")];
      for (const r of rows){
        const sid = r.dataset.songId;
        const title = r.querySelector("[data-title]").value.trim();
        const keywords = r.querySelector("[data-keywords]").value.trim() || null;
        const scriptureEl = r.querySelector("[data-scripture]");
        const scripture = (window.__isGospelArtist && scriptureEl) ? (scriptureEl.value.trim() || null) : null;
        const suno_prompt = (r.querySelector("[data-suno]")?.value || "").trim() || null;
        if (!title) continue;

        let upd = await supabase.from(SONGS).update({ title, keywords, scripture, suno_prompt }).eq("id", sid);
        if (upd.error && String(upd.error.message || "").toLowerCase().includes("suno_prompt")) {
          await supabase.from(SONGS).update({ title, keywords, scripture }).eq("id", sid);
        }
      }

      $("statusLine").textContent = "Saved ✅";
      await loadAlbum();
    }

    async function deleteAlbum(){
      const ok = confirm("Delete this album? Songs will be deleted too.");
      if (!ok) return;
      $("statusLine").textContent = "Deleting…";
      const { error } = await supabase.from(ALBUMS).delete().eq("id", id);
      if (error) { $("statusLine").textContent = "Error: " + error.message; return; }
      window.location.href = "./albums.html";
    }

    async function applyTracksToSongs(){
      const raw = parseTracksInput($("working_tracks").value);
      if (!raw) return alert("Paste valid JSON or a list of titles into TRACKS_JSON.");

      const tracks = normalizeTracks(raw);
      if (!tracks.length) return alert("No track titles found.");

      $("statusLine").textContent = "Updating songs…";

      await supabase.from(SONGS).delete().eq("album_id", id);

      const rowsWithSuno = tracks.map(t => ({
        album_id: id,
        track_number: t.track_number,
        title: t.title,
        suno_prompt: t.suno_prompt || null,
        keywords: t.keywords,
        scripture: t.scripture
      }));

      let ins = await supabase.from(SONGS).insert(rowsWithSuno);

      if (ins.error && String(ins.error.message || "").toLowerCase().includes("suno_prompt")) {
        const rowsNoSuno = tracks.map(t => ({
          album_id: id,
          track_number: t.track_number,
          title: t.title,
          keywords: t.keywords,
          scripture: t.scripture
        }));
        const ins2 = await supabase.from(SONGS).insert(rowsNoSuno);
        if (ins2.error) { $("statusLine").textContent = "Error: " + ins2.error.message; return; }
      } else if (ins.error) {
        $("statusLine").textContent = "Error: " + ins.error.message;
        return;
      }

      await supabase.from(ALBUMS).update({ working_tracklist: tracks }).eq("id", id);

      $("statusLine").textContent = "Songs updated ✅";
      await loadAlbum();
    }

    $("btnSave").onclick = saveAlbum;
    $("btnDelete").onclick = deleteAlbum;
    $("btnApplyTracks").onclick = applyTracksToSongs;
    $("btnImportExisting").onclick = () => {
      window.location.href = `./import-existing-song.html?album_id=${encodeURIComponent(id)}`;
    };

    $("btnCreatePlaylist").onclick = () => {
      if (!id) return alert("Missing album id.");
      window.location.href = `./album-playlist.html?album_id=${encodeURIComponent(id)}`;
    };

    $("btnCopyPrompt").onclick = async () => {
      const p = $("prompt").value;
      if (!p) return alert("No prompt stored.");
      await navigator.clipboard.writeText(p);
      $("statusLine").textContent = "Prompt copied ✅";
    };

    $("btnBack").onclick = () => window.location.href = "./albums.html";
    $("btnLogout").onclick = async () => {
      await supabase.auth.signOut();
      window.location.href = "./index.html";
    };

    await loadAlbum();
  </script>
</body>
</html>
